function el(tag){return document.createElement(tag);}
function div(css,html){var d=el('div');if(css)d.style.cssText=css;if(html)d.innerHTML=html;return d;}
function inp(val,setter,type,ph){
  var i=el('input');i.className='inp';i.type=type||'text';
  i.value=(val!==undefined&&val!==null)?String(val):'';
  if(ph)i.placeholder=ph;
  // Bug fix: commit the value on every keystroke (not just on 'change'/blur).
  // Previously the value was only saved to the booking object on 'change', which only
  // fires once the field loses focus. Tapping "Save" while a field was still focused
  // (very common on mobile) would just blur the field on the first tap without
  // reaching the Save button — so the user had to tap Save a second time before the
  // data actually got written. Using 'input' means the latest value is always already
  // on the object by the time Save is tapped, so a single tap saves correctly.
  i.addEventListener('input',function(){var v=i.value;if(type==='number')v=parseFloat(v)||0;setter(v);});
  return i;
}
function sel(val,opts,setter){
  var s=el('select');s.className='sel';
  opts.forEach(function(o){var op=el('option');op.value=o.v!==undefined?o.v:o;op.textContent=o.l!==undefined?o.l:o;if(String(op.value)===String(val))op.selected=true;s.appendChild(op);});
  s.addEventListener('change',function(){setter(s.value);});return s;
}
// Hybrid Date Input: supports BOTH a tappable date-picker AND free manual typing
// in DD/MM/YY or DD/MM/YYYY (also accepts '-' or '.' separators, and a typed
// YYYY-MM-DD is accepted too). Internal storage stays exactly what it always
// was — an ISO 'YYYY-MM-DD' string — so nts(), fmtD(), the auto check-out→next
// check-in carry-over logic, and every quotation/voucher/invoice/receipt that
// reads these fields keep working completely unchanged.
function isoToDMY(iso){
  if(!iso)return '';
  var p=String(iso).split('-');
  if(p.length!==3)return '';
  var y=p[0],mo=p[1],d=p[2].slice(0,2);
  if(!/^\d{4}$/.test(y)||!/^\d{1,2}$/.test(mo)||!/^\d{1,2}$/.test(d))return '';
  return d+'/'+mo+'/'+y;
}
function parseFlexDate(str){
  str=String(str||'').trim();
  if(!str)return null;
  var iso=str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  var d,mo,y;
  if(iso){y=parseInt(iso[1],10);mo=parseInt(iso[2],10);d=parseInt(iso[3],10);}
  else{
    var m=str.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2}|\d{4})$/);
    if(!m)return null;
    d=parseInt(m[1],10);mo=parseInt(m[2],10);y=parseInt(m[3],10);
    if(m[3].length===2)y=(y<=68?2000:1900)+y;
  }
  if(mo<1||mo>12)return null;
  var daysInMonth=new Date(y,mo,0).getDate();
  if(d<1||d>daysInMonth)return null;
  if(y<1000||y>9999)return null;
  var pad=function(n){return n<10?'0'+n:''+n;};
  return y+'-'+pad(mo)+'-'+pad(d);
}
function dateInp(val,setter,ph){
  var wrap=el('div');wrap.className='inp';
  wrap.style.cssText='position:relative;display:flex;align-items:center;padding:0';
  var t=el('input');t.type='text';t.value=isoToDMY(val);t.placeholder=ph||'DD/MM/YYYY';
  t.setAttribute('inputmode','numeric');t.setAttribute('autocomplete','off');
  t.style.cssText='flex:1;min-width:0;background:transparent;border:none;outline:none;color:inherit;font-size:15px;font-family:inherit;padding:12px 34px 12px 13px;box-sizing:border-box';
  var hd=el('input');hd.type='date';hd.value=val||'';hd.setAttribute('aria-label','Pick date');
  hd.style.cssText='position:absolute;right:2px;top:0;width:34px;height:100%;opacity:0;cursor:pointer;border:none;padding:0;margin:0';
  var icon=el('span');icon.textContent='📅';icon.setAttribute('aria-hidden','true');
  icon.style.cssText='position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.75';
  wrap.appendChild(t);wrap.appendChild(hd);wrap.appendChild(icon);
  function fireInput(){wrap.dispatchEvent(new Event('input'));}
  t.addEventListener('input',function(){
    var raw=t.value,iso=parseFlexDate(raw);
    if(iso){wrap.style.borderColor='';hd.value=iso;setter(iso);}
    else if(raw.trim()===''){wrap.style.borderColor='';hd.value='';setter('');}
    else{wrap.style.borderColor='#E74C3C';} // typed but not (yet) a valid complete date
    fireInput();
  });
  t.addEventListener('blur',function(){
    var iso=parseFlexDate(t.value);
    if(iso)t.value=isoToDMY(iso); // auto-format e.g. "5/1/26" -> "05/01/2026"
  });
  hd.addEventListener('change',function(){
    if(hd.value){t.value=isoToDMY(hd.value);wrap.style.borderColor='';setter(hd.value);fireInput();}
  });
  return wrap;
}

// ── TOOLTIPS (Booking list action icons) ──────────────────────
// Sets the native `title` attribute (desktop hover tooltip — no JS needed for
// that part) and, for touch devices, shows the same text in a small neutral
// bubble on the first touch (styled like the existing overlay/dialog boxes:
// dark bg, gold border, no external library). Uses {passive:true} and never
// calls preventDefault/stopPropagation, so the button's existing click/tap
// action still fires exactly as before — this only adds a hint, nothing else.
function withTooltip(btnEl,text){

// Bug fix: some restricted in-app browsers/WebViews can leave a fetch() or
// html2canvas render hanging indefinitely (neither resolves nor rejects), which
// left action buttons stuck showing a spinner forever with no feedback. Racing
// against a timeout guarantees the UI always recovers and tells the user what
// happened, even if the underlying call never completes.
function withTimeout(promise,ms,label){
  return new Promise(function(resolve,reject){
    var settled=false;
    var timer=setTimeout(function(){
      if(!settled){settled=true;reject(new Error((label||'Operation')+' timed out'));}
    },ms);
    promise.then(function(v){if(!settled){settled=true;clearTimeout(timer);resolve(v);}},
                 function(e){if(!settled){settled=true;clearTimeout(timer);reject(e);}});
  });
}
// Cleaner code: shared helpers previously duplicated (near-identically) in both
// bDash() and bList() — one definition, used everywhere a status color or an
// avatar's initials are needed.
function statusColor(status){

    // legacy values — kept mapped so any not-yet-normalized old record still colors correctly

// Phase 1A/1B: brings any older booking record (saved before this update) up to the
// new data model with sensible defaults, and migrates the old 4-stage status values
// to their closest new-stage equivalent. Never overwrites fields that already exist,
// so nothing already saved is ever changed in meaning — only filled in where missing.
function normalizeBooking(b){
  if(!b) return b;
  if(b.status==='Quotation') b.status='Quotation Sent';
  else if(b.status==='Cancelled') b.status='Lost';
  else if(!b.status) b.status='New Inquiry';
  if(b.priority===undefined) b.priority='Medium';
  if(b.followUpDate===undefined) b.followUpDate='';
  if(b.followUpNotes===undefined) b.followUpNotes='';
  if(b.lostReason===undefined) b.lostReason='';
  if(b.lostReasonOther===undefined) b.lostReasonOther='';
  if(b.terms===undefined) b.terms=[];
  if(b.remarks===undefined) b.remarks='';
  if(b.paymentPolicy===undefined) b.paymentPolicy='';
  if(b.packageTemplateId===undefined) b.packageTemplateId=null;
  if(b.packageTemplateName===undefined) b.packageTemplateName='';
  return b;
}

function getInitials(name){

// Bug fix: deleting a booking previously happened instantly on tap, with zero

// This shows a themed Yes/Cancel dialog first.
// okLabel/cancelLabel are optional (default 'Delete'/'Cancel' — unchanged for every
// existing caller that only passes message+onConfirm). Passing custom labels lets a
// caller reuse this exact dialog (same logic, same styling, same close()/onConfirm()
// flow) with wording that fits the action, e.g. 'Replace' instead of 'Delete' for a
// non-destructive template swap.
function confirmDialog(message,onConfirm,okLabel,cancelLabel){
  var overlay=el('div');
  overlay.style.cssText='position:fixed;inset:0;background:#000000aa;z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px';
  var box=el('div');
  box.style.cssText='background:#1A1D27;border:1.5px solid #2A2D3A;border-radius:14px;padding:22px 20px;max-width:320px;width:100%;text-align:center;box-shadow:0 12px 32px rgba(0,0,0,.5)';
  var iconEl=el('div');iconEl.style.cssText='font-size:30px;margin-bottom:8px';iconEl.textContent='⚠️';

// new quotation number via the EXISTING smart-numbering function genQuotNo()
// (same one newBk() uses), then saves it via the EXISTING saveBooking() flow
// and opens it using the EXACT same "open a booking in the form" pattern
// used everywhere else in the app (APP.edit=…; APP.ftab='guest'; go('form')).
// No new quotation-numbering, save, or navigation logic is introduced.
function duplicateBooking(bk){

  copy.quotNo=genQuotNo();

// Attaches long-press (500ms) detection to a Booking Card. Mobile only
// (bails out above 768px width). Cancels on scroll/drag (>10px movement) so
// normal list scrolling is never interrupted, and skips entirely if the
// press started on a button (so the existing per-card action buttons in
// bList keep working exactly as before). On a genuine long-press it opens
// the Quick Action Menu and suppresses the synthetic click that would
// otherwise follow touchend (via preventDefault), so the card's own
// existing tap-to-edit behavior — reused, not touched — doesn't also fire.
function attachLongPress(cardEl,bk){
  var timer=null,startX=0,startY=0,fired=false,skip=false;
  var MOVE_TOL=10,PRESS_MS=500;
  function clearTimer(){ if(timer){clearTimeout(timer);timer=null;} }
  cardEl.addEventListener('touchstart',function(e){
    if(window.innerWidth>768){ skip=true; return; }
    skip = !!(e.target && e.target.closest && e.target.closest('button'));
    if(skip) return;
    var t=e.touches[0];startX=t.clientX;startY=t.clientY;fired=false;
    clearTimer();
    timer=setTimeout(function(){
      fired=true;
      if(navigator.vibrate) navigator.vibrate(15);
      openQuickActionMenu(bk);
    },PRESS_MS);
  },{passive:true});
  cardEl.addEventListener('touchmove',function(e){
    if(skip||!timer) return;
    var t=e.touches[0];
    if(Math.abs(t.clientX-startX)>MOVE_TOL || Math.abs(t.clientY-startY)>MOVE_TOL) clearTimer();
  },{passive:true});
  cardEl.addEventListener('touchend',function(e){
    clearTimer();
    if(fired) e.preventDefault(); // suppress the resulting synthetic click
    fired=false;
  },{passive:false});
  cardEl.addEventListener('touchcancel',function(){ clearTimer();fired=false; },{passive:true});
}

function go(page,skipFetch){
  APP.page=page;
  // Swipe Navigation reuses APP._formTabs/APP._formSwitchTabFn, which are
  // only ever (re)set inside bForm() while page==='form'. Clearing them here
  // on every other page prevents a stale reference to a previous booking's
  // closure from ever firing.
  if(page!=='form'){ APP._formTabs=null; APP._formSwitchTabFn=null; }
  document.querySelectorAll('.ni').forEach(function(b){b.classList.toggle('on',b.dataset.p===page||(page==='form'&&b.dataset.p==='list'));});
  var c=document.getElementById('content');c.innerHTML='';c.scrollTop=0;
  var nav=document.getElementById('nav'),fb=document.getElementById('formBar'),fab=document.getElementById('fabBar'),scb=document.getElementById('stickyCostBar');
  // One-hand UX: while editing a booking, swap the bottom tab bar for a sticky
  // Cancel/Save action bar so the primary action is always one thumb-tap away —
  // no scrolling to the bottom of a long form required.
  if(page==='form'){
    nav.style.display='none'; fb.style.display='flex'; c.classList.add('form-open');
    // Mobile-only Floating Action Bar sits directly above #formBar. Its exact
    // height varies with safe-area insets, so position it using formBar's real
    // rendered height rather than a hardcoded number.
    fab.style.bottom=fb.offsetHeight+'px';
    fab.classList.add('show'); c.classList.add('fab-open');
    scb.classList.add('show');
  }
  else {
    nav.style.display='grid'; fb.style.display='none'; c.classList.remove('form-open');
    fab.classList.remove('show'); c.classList.remove('fab-open');
    scb.classList.remove('show');
  }
  updateOptSwitchBarVisibility();
  // Perf fix (1): right after a save, APP.bookings is already up to date locally —
  // re-fetching from the server here just adds a slow network round-trip before the
  // list re-appears. skipFetch=true renders instantly from local memory instead, and
  // a background sync (already triggered by saveBooking) reconciles with the server.
  if(page==='dash'){ if(skipFetch){c.innerHTML='';c.appendChild(bDash());} else{ showLoading(c); loadBookings().then(function(){c.innerHTML='';c.appendChild(bDash());}); } }
  else if(page==='list'){ if(skipFetch){c.innerHTML='';c.appendChild(bList());} else{ showLoading(c); loadBookings().then(function(){c.innerHTML='';c.appendChild(bList());}); } }
  else if(page==='form') c.appendChild(bForm());
  else if(page==='hotels'){ showLoading(c); loadHotels().then(function(){c.innerHTML='';c.appendChild(bHotels());}); }
  else if(page==='itinTpl'){ loadItinTemplates(); c.appendChild(bItinTemplates()); }
  else if(page==='pkgTpl'){ loadPkgTemplates(); c.appendChild(bPkgTemplates()); }
  else if(page==='sync') c.appendChild(bSyncPage());
}

// ── Mobile Swipe Navigation between Booking Tabs ────────────────────────
// Left/right swipe moves Guest ⇄ Package ⇄ Hotels ⇄ Vehicle ⇄ Itinerary ⇄
// Docs ⇄ Confirm — the SAME order and the SAME sw(id) tab-switch closure
// bForm() already uses for its tab bar clicks and its existing Prev/Next
// buttons (APP._formTabs / APP._formSwitchTabFn, set inside bForm()). No new
// tab system, no new switching logic — this only decides *which direction*
// to move and calls the existing function, exactly like the Prev/Next
// buttons already do (tabs[idx-1]/tabs[idx+1]).
(function(){
  var content=document.getElementById('content');
  if(!content) return;
  var startX=0,startY=0,startTime=0,ignore=false;
  var DIST=60,RATIO=1.4,MAXTIME=700;
  // Walks up from the touch's target looking for an element that can itself
  // scroll horizontally (e.g. the .tabs bar, or a costing table's scroll
  // wrapper) — if found, that element's own native scrolling handles the
  // gesture instead of the swipe-between-tabs behavior.
  function withinHorizontalScroller(el2){
    while(el2 && el2!==document.body && el2!==document.documentElement){
      var cs=window.getComputedStyle(el2);
      if((cs.overflowX==='auto'||cs.overflowX==='scroll') && el2.scrollWidth>el2.clientWidth+1) return true;
      el2=el2.parentElement;
    }
    return false;
  }
  function isFormField(el2){
    return !!(el2 && el2.closest && el2.closest('input,textarea,select'));
  }
  content.addEventListener('touchstart',function(e){
    if(window.innerWidth>768 || APP.page!=='form') { ignore=true; return; }
    var t=e.touches[0];
    startX=t.clientX; startY=t.clientY; startTime=Date.now();
    ignore = isFormField(e.target) || withinHorizontalScroller(e.target);
  },{passive:true});
  content.addEventListener('touchend',function(e){
    if(ignore || window.innerWidth>768 || APP.page!=='form') return;
    var t=e.changedTouches[0];
    var dx=t.clientX-startX, dy=t.clientY-startY, dt=Date.now()-startTime;
    // Normal vertical scrolling is left completely alone — we never call
    // preventDefault anywhere in this handler — and only a clearly
    // horizontal, reasonably fast, reasonably long drag counts as a swipe.
    if(dt<=MAXTIME && Math.abs(dx)>=DIST && Math.abs(dx)>Math.abs(dy)*RATIO){
      swipeFormTab(dx<0?1:-1);
    }
  },{passive:true});
})();
// Reuses APP._formTabs (the exact tabs[] array from bForm()) and
// APP._formSwitchTabFn (the exact sw(id) closure from bForm()) to move one
// step left/right — identical logic to the existing Prev/Next buttons.
function swipeFormTab(dir){
  if(typeof APP._formSwitchTabFn!=='function' || !APP._formTabs) return;
  var idx=APP._formTabs.findIndex(function(t){return t.id===APP.ftab;});
  if(idx<0) return;
  var newIdx=idx+dir;
  if(newIdx<0 || newIdx>=APP._formTabs.length) return; // already at the first/last tab
  APP._formSwitchTabFn(APP._formTabs[newIdx].id);
}

// ════════════════════════════════════════════════════════════
//  PDF GENERATORS
// ════════════════════════════════════════════════════════════
function openPrint(html,filename){
  filename=filename||'Mishri_Document';
  var baseName=filename.replace('.pdf','').replace('.html','');

  // Create preview overlay
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:#000d;z-index:9999;display:flex;flex-direction:column';

  // Top bar
  var topBar=document.createElement('div');
  topBar.style.cssText='background:#1A1D27;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid #2A2D3A';

  // Close function
  function closeOverlay(){ document.body.removeChild(overlay); }

  // Back button (big, left side)
  var backBtn=document.createElement('button');
  backBtn.className='btn bm sm';
  backBtn.innerHTML='&#8592; Back';
  backBtn.style.cssText='border-radius:16px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#8A8090;border:1.5px solid #8A8090;flex-shrink:0';
  backBtn.addEventListener('click',closeOverlay);

  var titleEl=document.createElement('div');
  titleEl.style.cssText='color:#D4A843;font-weight:700;font-size:12px;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px';
  titleEl.textContent=baseName;

  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:6px;flex-shrink:0';

  // Download PDF button
  var dlBtn=document.createElement('button');
  dlBtn.style.cssText='border-radius:16px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;background:#D4A843;color:#1a1d27;border:1.5px solid #D4A843';
  dlBtn.textContent='⬇ Save PDF';
  dlBtn.addEventListener('click',function(){
    var originalLabel=dlBtn.textContent;
    dlBtn.textContent='⏳ Preparing...';dlBtn.disabled=true;
    function reset(){dlBtn.textContent=originalLabel;dlBtn.disabled=false;}
    function fallbackHtmlDownload(){
      var blob=new Blob([html],{type:'text/html;charset=utf-8'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url; a.download=baseName+'.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},3000);
      reset();
      toast('PDF library unavailable offline — downloaded as HTML instead. Open once online to enable PDF export.',false);
    }
    // Perf: html2pdf.js (jsPDF + html2canvas) is only fetched the first time someone
    // actually taps Save PDF, not on every app load. Cached after that (see
    // loadScriptOnce), so subsequent exports in the same session are instant.
    loadScriptOnce(HTML2PDF_CDN).then(function(){
      dlBtn.textContent='⏳ Generating...';
      // Bug fix: previously rendered the document into an off-screen div
      // (position:left:-9999px) before capturing it — several mobile browsers /
      // in-app WebViews never actually paint elements pushed that far off-screen,
      // so html2canvas captured a blank page (PDF looked empty). Capturing directly
      // from the preview <iframe> below — which is already fully rendered and
      // visible on screen — fixes this reliably across browsers.
      var target=iframe.contentDocument.body;
      return withTimeout(window.html2pdf().set({
        margin:0,
        filename:baseName+'.pdf',
        image:{type:'jpeg',quality:0.98},
        html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff',onclone:function(clonedDoc){
          // Bug fix (PDF black/dimmed background): html2canvas builds its own
          // offscreen clone of the target document and renders THAT into a
          // canvas — it does this inside the main app page's context, and the
          // main app page has no color-scheme declared (it's an intentionally
          // dark-themed app). Android Chrome's "Force Dark" can't semantically
          // re-theme a raster canvas, so instead it just dims/darkens it — which
          // is exactly what showed up in exported PDFs (colours all correct,
          // just uniformly darkened). Forcing this specific clone to light mode
          // stops that dimming, without touching the main app's own dark theme
          // or any of the 5 document templates' own markup/CSS.
          // Wrapped in try/catch so if anything here ever fails, PDF export
          // still proceeds exactly as before — this can never break an export.
          try{
            clonedDoc.documentElement.style.colorScheme='only light';
            if(clonedDoc.body){
              clonedDoc.body.style.colorScheme='only light';
              clonedDoc.body.style.background=clonedDoc.body.style.background||'#ffffff';
            }
          }catch(e){}
        }},
        jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
        pagebreak:{mode:['css','avoid-all']}
      }).from(target).save(),20000,'PDF export');
    }).then(function(){
      reset();
      toast('✅ PDF downloaded!');
    }).catch(function(err){
      if(typeof window.html2pdf!=='function'){ fallbackHtmlDownload(); return; }
      reset();
      var msg=(err&&/timed out/.test(err.message))?'PDF export is taking too long on this browser — try the 🖨 Print button and use "Save as PDF" instead':'PDF export failed — try the 🖨 Print button instead';
      toast(msg,false);
    });
  });

  // Print button
  var prBtn=document.createElement('button');
  prBtn.style.cssText='border-radius:16px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#D4A843;border:1.5px solid #D4A843';
  prBtn.textContent='🖨';
  prBtn.addEventListener('click',function(){
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
  });

  btnRow.appendChild(dlBtn);
  btnRow.appendChild(prBtn);
  topBar.appendChild(backBtn);
  topBar.appendChild(titleEl);
  topBar.appendChild(btnRow);
  overlay.appendChild(topBar);

  // iframe preview
  var iframe=document.createElement('iframe');
  iframe.style.cssText='flex:1;border:none;background:#fff';
  overlay.appendChild(iframe);

  document.body.appendChild(overlay);

  // Write HTML into iframe
  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();
}

// ════════════════════════════════════════════════════════════
//  COMPANY LOGO — single reusable helper shared by every document
//  generator (Quotation, Multi-Quotation, Voucher, Invoice, Receipt) so the
//  logo markup lives in ONE place instead of being duplicated 5 times.
//  Embedded as a base64 data URI (baked in from the official uploaded logo
//  file) so it renders instantly and fully offline with zero network

// Returns an <img> tag for the official company logo.
//   heightPx : rendered height in px. Width is left as "auto" so the
//              browser always scales using the image's own aspect ratio —
//              it can never be stretched or squashed.
//   badge    : pass true when placing the logo on a dark-coloured header
//              bar (e.g. the Voucher's navy header) — wraps it in a small
//              light rounded card so the logo stays clearly visible against
//              the dark background. Leave false/omitted for headers that
//              already sit directly on the document's white page background
//              (Quotation, Multi-Quotation, Invoice, Receipt).
// If the image ever fails to load for any reason, onerror simply hides the
// broken-image icon (display:none) instead of throwing a JS error — so a
// document always finishes generating correctly, logo or no logo.
function docLogoHtml(heightPx,badge){
  heightPx=heightPx||42;
  var img='<img src="'+MISHRI_LOGO_DATA_URI+'" alt="Mishri Holidays" '
    +'style="display:block;height:'+heightPx+'px;width:auto;max-width:220px;object-fit:contain" '
    +'onerror="this.style.display=\'none\'">';
  if(badge){
    return '<span style="display:inline-block;background:#F7F7F7;border-radius:6px;padding:4px 10px;line-height:0">'+img+'</span>';
  }
  return img;
}

// ════════════════════════════════════════════════════════════
//  COMPANY CONTACT DETAILS — single reusable helper shared by every
//  document generator (Quotation, Multi-Quotation, Voucher, Invoice,
//  Receipt) so the official mobile numbers / email live in ONE place
//  instead of being duplicated across documents. To update the contact
//  details for every document at once, edit ONLY the three constants below.
// ════════════════════════════════════════════════════════════
var MISHRI_MOBILE_1='+91 99981 47184';
var MISHRI_MOBILE_2='+91 79909 17434';
var MISHRI_EMAIL='mishriholidays@gmail.com';

// Returns the shared contact markup: both mobile numbers on a single line
// with a phone icon, followed by the email on its own line with an email
// icon. Each number is wrapped in white-space:nowrap so it can never break
// awkwardly across two lines (e.g. "99981" / "47184" splitting apart).
// Callers wrap this in their own existing container (div/class) so each
// document keeps its own font-size/colour/positioning exactly as before —
// this helper only supplies the inner contact content.
function docContactHtml(){
  return '<span style="white-space:nowrap">&#9742;&nbsp;'+MISHRI_MOBILE_1+'</span>'
    +'&nbsp;/&nbsp;'
    +'<span style="white-space:nowrap">'+MISHRI_MOBILE_2+'</span>'
    +'<br>'
    +'<span style="white-space:nowrap">&#9993;&nbsp;'+MISHRI_EMAIL+'</span>';
}

// ════════════════════════════════════════════════════════════
//  SHARED PRINT & TYPOGRAPHY POLISH CSS — reused by every document
//  generator (Quotation, Multi-Quotation, Voucher, Invoice, Receipt) so
//  presentation-only fixes (no-wrap utility for short labels like vehicle
//  type / cab numbers, and PDF page-break behaviour for tables) live in ONE
//  place instead of being duplicated 5 times. Purely additive: does not
//  touch any existing colour, font, size, spacing or structural rule in the
//  per-document stylesheets.
// ════════════════════════════════════════════════════════════
function docPolishCss(){
  return '.nowrap{white-space:nowrap}'
    +'table{page-break-inside:auto}'
    +'tr{page-break-inside:avoid}'
    +'thead{display:table-header-group}';
}

// Shared across Quotation generators: derive a readable Pickup/Drop summary from
// the Vehicle tab entries (v.from / v.to), instead of wrongly showing the
// destination name in that field.
function pickupDropStr(b){
  var vehs=(b.vehicles||[]).filter(function(v){return v.from||v.to;});
  if(!vehs.length) return 'As per itinerary';
  return vehs.map(function(v){return (v.from||'—')+' &rarr; '+(v.to||'—');}).join(' &nbsp;|&nbsp; ');
}
// Shared Vehicle Details table (Type, Cab No., Pick Up, Drop) for the Quotation docs —
// same info the Voucher already shows, so guests see it before confirming too.
function vehTableHtml(vehs){
  if(!vehs||!vehs.length) return '';
  var rows=vehs.map(function(v){
    return '<tr><td class="nowrap">'+(v.type||'—')+'</td><td class="nowrap">'+(v.vehicleNo||'—')+'</td><td>'+(v.from||'—')+'</td><td>'+(v.to||'—')+'</td></tr>';
  }).join('');
  return '<div class="section-title">VEHICLE DETAILS</div>'
    +'<table style="margin-bottom:8px"><tr><th>Vehicle Type</th><th>Cab No.</th><th>Pick Up</th><th>Drop</th></tr>'+rows+'</table>'
    +'<div style="font-size:9.5px;color:#666;margin-bottom:6px">650 kms included in package; any usage beyond to be paid directly to driver</div>';
}

// Premium sales-copy sections (content only) — shared by makeQuot (single option)

function makeQuot(b,on){
  var c=calcOpt(b,on),opt=b['opt'+on]||[];
  var hotels=opt.filter(function(h){return h.hotelName&&h.checkIn&&h.checkOut;});
  var vehs=(b.vehicles||[]).filter(function(v){return v.type||v.cost>0;});

  // Hotel rows - Destination | Hotel & Room | Meal | Rooms format (like PDF)
  var destMap={};
  hotels.forEach(function(h){
    var n=nts(h.checkIn,h.checkOut);
    var key=h.place+'___'+n;
    if(!destMap[key]) destMap[key]={place:h.place,nights:n,hotels:[],checkIn:h.checkIn,checkOut:h.checkOut};
    destMap[key].hotels.push(h);

  var hotelRows='';

    if(parseInt(h.chargeableChild)>0)extraBits.push('Child (WB): '+h.chargeableChild);
    if(parseInt(h.childNoBed)>0)extraBits.push('Child (NB): '+h.childNoBed);
    var extraNote=extraBits.length?'<br><span style="font-size:8.5px;color:#8B4513">'+extraBits.join(' &bull; ')+'</span>':'';
    // Bug fix (2): show Room Category clearly plus Check-in / Check-out dates

      +'<td>'+h.hotelName+'<br><span style="font-size:9px;color:#666">'+(h.roomCat||'—')+'</span>'+extraNote+'</td>'
      +'<td style="text-align:center" class="nowrap">'+fmtD(h.checkIn)+'</td>'
      +'<td style="text-align:center" class="nowrap">'+fmtD(h.checkOut)+'</td>'

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">'
    // Bug fix (Android black background, investigated — root cause confirmed

function makeMultiQuot(b, options){

  // Bug fix (3): removed auto-generated "Houseboat Cruise Itinerary" block — see makeQuot for details.

  var combinedHotelRows='';

      +'<div style="background:'+cols[on]+';color:#fff;padding:6px 12px;font-weight:800;font-size:10.5px;letter-spacing:0.5px">OPTION '+on+' — '+hotelNamesForCard+'</div>'

// ── FAST QUOTATION ──────────────────────────────────────────────────────
// One-tap "Generate Quotation" shortcuts (mobile Quick Action sheet, mobile
// Floating Action Bar, and the Bookings List row button) previously always
// called makeQuot(bk, bk.selectedOption||1) — i.e. always Option 1 (or
// whichever single option was last selected) even when the booking actually
// has 2 or 3 priced options filled in. Fixed here in ONE shared place so all
// three call sites reuse identical logic (no duplicated detection code):
//   - optionHasData() reuses the exact same "is this a real hotel row" check
//     makeQuot() itself already uses to decide what to print
//     (h.hotelName && h.checkIn && h.checkOut) — not a new/separate rule.
//   - If only one option (or none) has data, behaves exactly as before:
//     a single-option makeQuot() PDF.
//   - If more than one option has data, it now calls the EXISTING
//     makeMultiQuot(b, options) (already used by the Docs tab's Multi
//     Quotation buttons) instead of silently dropping Options 2/3.
// Quotation design/markup is untouched — this only changes which existing
// generator function gets called and with which option numbers.
function optionHasData(b,n){
  var opt=b['opt'+n]||[];
  return opt.some(function(h){return h && h.hotelName && h.checkIn && h.checkOut;});
}
function getFilledOptions(b){
  return [1,2,3].filter(function(n){return optionHasData(b,n);});
}
function fastQuot(bk){
  if(!bk) return;
  var filled=getFilledOptions(bk);
  if(filled.length>1){
    openPrint(makeMultiQuot(bk,filled),'Quotation_Opt'+filled.join('_')+'_'+bk.quotNo+'.pdf');
  } else {
    var on=filled.length===1?filled[0]:(bk.selectedOption||1);
    openPrint(makeQuot(bk,on),'Quotation_'+bk.quotNo+'.pdf');
  }
}

function makeVouch(b){
  var on=b.selectedOption||1,c=calcOpt(b,on);
  var hotels=(b['opt'+on]||[]).filter(function(h){return h.hotelName&&h.checkIn;});
  // Bug fix (2): a vehicle slot only counts as a real vehicle if it has a Type entered.
  // Previously any slot with just a Pick-Up/Drop value (even without a vehicle type)
  // was treated as a separate vehicle, causing a duplicate/blank row with repeated
  // Pick-Up & Drop info in the voucher.
  // Bug fix (2): previously a vehicle row needed a "Type" to appear, so a Cab Number
  // entered without a Type never showed up in the voucher at all. Now a row shows if
  // EITHER Type or Cab Number is filled in.
  var vehs=(b.vehicles||[]).filter(function(v){return v.type||v.vehicleNo;});
  var hr='',vr='',ir='';

    var hotelSubHtml=hotelSub.length?'<br><span style="font-size:8.5px;color:#666">'+hotelSub.join(' &bull; ')+'</span>':'';
    var placeHtml=h.place+(h.address?'<br><span style="font-size:8.5px;color:#666">'+h.address+'</span>':'');
    // Bug fix (5): show Check-in / Check-out TIME alongside the date
    var checkInHtml=fmtD(h.checkIn)+(h.checkInTime?'<br><span style="font-size:8.5px;color:#666">'+fmtT(h.checkInTime)+'</span>':'');
    var checkOutHtml=fmtD(h.checkOut)+(h.checkOutTime?'<br><span style="font-size:8.5px;color:#666">'+fmtT(h.checkOutTime)+'</span>':'');
    // Bug fix (3): Room Category now shown as its own column (was missing entirely).
    // Bug fix (5): Confirmation No. now shown right beside the Hotel Name (bold,
    // green) instead of a separate column at the far end of a wide table — much
    // easier to spot at a glance. Still flagged if left blank.
    if(!h.confirmNo) missingConfirmNo=true;
    var confBadge=h.confirmNo?(' &nbsp;<span style="color:#1a7a3a;font-weight:700;white-space:nowrap">[Conf: '+h.confirmNo+']</span>'):'';
    hr+='<tr><td><b>'+h.hotelName+'</b>'+confBadge+hotelSubHtml+'</td><td>'+(h.roomCat||'\u2014')+'</td><td>'+placeHtml+'</td><td>'+checkInHtml+'</td><td>'+checkOutHtml+'</td><td>'+nts(h.checkIn,h.checkOut)+'</td><td>'+mealLabel(h.mealPlan)+'</td></tr>';
  });
  // Bug fix (2): show the Vehicle / Cab Number alongside the vehicle type
  vehs.forEach(function(v){vr+='<tr><td class="nowrap">'+v.type+'</td><td class="nowrap">'+(v.vehicleNo||'\u2014')+'</td><td>'+v.from+'</td><td>'+v.to+'</td></tr>';});
  (b.itinerary||[]).forEach(function(d,i){if(d)ir+='<tr><td style="font-weight:bold;background:#f5f5f5;white-space:nowrap;font-size:10px">Day '+(i+1)+'</td><td>'+d+'</td></tr>';});
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:10.5px;color:#333;line-height:1.5}.pg{padding:8mm 12mm}.hd{background:#1a1d27;color:#fff;padding:12px 16px;border-radius:5px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.lo{font-size:16px;font-weight:900;color:#D4A843}.st{background:#D4A843;color:#1a1d27;padding:3px 9px;font-weight:bold;font-size:10px;border-radius:3px;margin:10px 0 6px;display:inline-block}.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.ir{display:flex;gap:4px;margin-bottom:2px;align-items:baseline}.lb{font-weight:bold;min-width:110px;color:#555;font-size:10px}.vl{font-size:10px}.vg-bg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.vg-row{display:flex;gap:4px;margin-bottom:2px;align-items:baseline;flex-wrap:wrap}.vg-label{font-weight:bold;min-width:110px;color:#555;font-size:10px}.vg-value{font-size:10px}@media screen and (max-width:768px){.vg-bg{grid-template-columns:1fr;gap:6px}.vg-row{flex-direction:column;gap:1px;margin-bottom:8px}.vg-label{min-width:0}}table{width:100%;border-collapse:collapse}th{background:#2c2c3e;color:#D4A843;padding:6px 8px;font-size:9px;text-align:left;vertical-align:middle}td{padding:6px 8px;border:1px solid #e5e5e5;font-size:10px;vertical-align:middle;line-height:1.4}.imp{background:#fff3cd;border:1px solid #D4A843;border-radius:3px;padding:8px;margin:10px 0;font-size:10px}.ft{margin-top:14px;border-top:1px solid #D4A843;padding-top:8px;text-align:center;font-size:9px;color:#666}@media print{.pg{padding:5mm 8mm}}'+docPolishCss()+'</style></head><body><div class="pg"><div class="hd"><div style="display:flex;align-items:center;gap:8px">'+docLogoHtml(30,true)+'<div><div style="font-size:9px;color:#ccc">Travel Voucher &mdash; Confirmed Booking</div><div style="font-size:8px;color:#ccc;margin-top:2px;line-height:1.4">'+docContactHtml()+'</div></div></div><div style="background:#D4A843;color:#1a1d27;padding:5px 14px;border-radius:4px;font-weight:bold;font-size:13px">VOUCHER</div></div><div class="vg-bg"><div><div class="st">BOOKING</div><div class="vg-row"><span class="vg-label">Ref No.:</span><span class="vg-value"><b>'+(b.bookingRef||b.quotNo)+'</b></span></div><div class="vg-row"><span class="vg-label">Booking Date:</span><span class="vg-value">'+fmtD(b.bookingDate)+'</span></div><div class="vg-row"><span class="vg-label">Tour Start:</span><span class="vg-value">'+fmtD(b.startDate)+'</span></div><div class="vg-row"><span class="vg-label">Tour End:</span><span class="vg-value">'+fmtD(b.endDate)+'</span></div><div class="vg-row"><span class="vg-label">Destination:</span><span class="vg-value">'+b.destination+'</span></div></div><div><div class="st">GUEST</div><div class="vg-row"><span class="vg-label">Name:</span><span class="vg-value"><b>'+b.guestName+'</b></span></div><div class="vg-row"><span class="vg-label">Contact:</span><span class="vg-value">'+b.contact+'</span></div><div class="vg-row"><span class="vg-label">Adults/Children:</span><span class="vg-value">'+b.adults+' Adult(s)'+(c.chargeableChild>0?' + '+c.chargeableChild+' Child(WB)':'')+(c.childNoBedQty>0?' + '+c.childNoBedQty+' Child(NB)':'')+'</span></div><div class="vg-row"><span class="vg-label">Rooms:</span><span class="vg-value">'+b.rooms+'</span></div>'+(c.maxExtraMattress>0?'<div class="vg-row"><span class="vg-label">Extra Mattress:</span><span class="vg-value">'+c.maxExtraMattress+'</span></div>':'')+'</div></div><div class="st">HOTEL CONFIRMATIONS</div><table><tr><th>Hotel</th><th>Room Cat.</th><th>Place</th><th>Check In</th><th>Check Out</th><th>Nights</th><th>Meal</th></tr>'+hr+'</table>'+(vr?'<div class="st">VEHICLE &amp; TRANSPORT</div><table><tr><th>Vehicle</th><th>Vehicle / Cab No.</th><th>Pick Up</th><th>Drop</th></tr>'+vr+'</table>':'')+'<div class="st">DRIVER</div><div class="g2"><div><div class="ir"><span class="lb">Driver:</span><span class="vl">'+(b.driverName||'—')+'</span></div><div class="ir"><span class="lb">Contact:</span><span class="vl">'+(b.driverContact||'—')+'</span></div></div></div>'+(ir?'<div class="st">ITINERARY</div><table>'+ir+'</table>':'')+(missingConfirmNo?'<div class="imp" style="background:#fdecec;border-color:#c0392b"><b>&#9888; NOTE:</b> One or more hotels above do not have a Confirmation No. yet — please update before sharing this voucher as final.</div>':'')+'<div class="imp"><b>&#9888; IMPORTANT:</b> Carry this voucher with a valid photo ID. Please refer to each hotel&rsquo;s check-in / check-out time shown above.</div><div class="ft">Thank you for choosing <b>Mishri Holidays</b></div></div></body></html>';

// Feature (6): default (auto-calculated) invoice rows, used when the user hasn't
// customized invoiceItems manually yet.
function defaultInvoiceItems(b){
  var on=b.selectedOption||1,c=calcOpt(b,on);
  var items=[{desc:'Tour Package \u2013 Adult (Option '+on+(b.destination?' \u2013 '+b.destination:'')+')',qty:c.adults,rate:c.perAdult}];
  if(c.chargeableChild>0) items.push({desc:'Tour Package \u2013 Child (With Bed)',qty:c.chargeableChild,rate:c.perChild});
  if(c.childNoBedQty>0) items.push({desc:'Tour Package \u2013 Child (No Bed)',qty:c.childNoBedQty,rate:c.perChildNoBed});
  return items;
}
function getInvItems(b){
  return (b.invoiceItems&&b.invoiceItems.length)?b.invoiceItems:defaultInvoiceItems(b);
}

function makeInv(b){
  var on=b.selectedOption||1,c=calcOpt(b,on);
  var received=parseFloat(b.paymentReceived)||0;
  var bal=c.grandTotal-received;
  var paid=bal<=0;
  var invNo=(b.bookingRef||b.quotNo||'')+'-INV';
  var srNo=0;
  var invItems=getInvItems(b);
  var itemRows=invItems.map(function(it){
    var qty=parseFloat(it.qty)||0,rate=parseFloat(it.rate)||0,tot=qty*rate;
    return '<tr><td class="c">'+(++srNo)+'</td><td>'+(it.desc||'&mdash;')+'</td><td class="c">'+qty+'</td><td class="r">'+fmt(rate)+'</td><td class="r">'+fmt(tot)+'</td></tr>';
  }).join('');
  var displayGrandTotal=invItems.reduce(function(sum,it){return sum+((parseFloat(it.qty)||0)*(parseFloat(it.rate)||0));},0);
  bal=displayGrandTotal-received;
  paid=bal<=0;

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">'
    +'<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'
    +'<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">'
    +'<style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'

// Feature (7): amount-in-words helper for the Payment Receipt (Indian numbering)
function numToWords(num){
  num=Math.round(num||0);
  if(num===0) return 'Zero';
  var neg=num<0; num=Math.abs(num);
  var ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  var tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function twoDigit(n){ if(n<20) return ones[n]; return (tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'')).trim(); }
  function threeDigit(n){ var s=''; if(n>=100){ s+=ones[Math.floor(n/100)]+' Hundred'; n=n%100; if(n) s+=' '; } if(n>0) s+=twoDigit(n); return s; }
  var crore=Math.floor(num/10000000); num%=10000000;
  var lakh=Math.floor(num/100000); num%=100000;
  var thousand=Math.floor(num/1000); num%=1000;
  var rest=num;
  var parts=[];
  if(crore) parts.push(threeDigit(crore)+' Crore');
  if(lakh) parts.push(threeDigit(lakh)+' Lakh');
  if(thousand) parts.push(threeDigit(thousand)+' Thousand');
  if(rest) parts.push(threeDigit(rest));
  return (neg?'Minus ':'')+parts.join(' ');
}

// Perf: search-index cache for the Bookings list. Keyed by object reference via
// WeakMap (not a property on the booking itself) so it can never leak into a saved/
// cloned copy and go stale, and old entries are garbage-collected automatically
// whenever saveBooking() replaces a booking with a new object (which it always does).
var _searchIdxCache=new WeakMap();
function getSearchIdx(b){
  var idx=_searchIdxCache.get(b);
  if(idx===undefined){
    // Mobile Number (b.contact) added to the existing index so Guest Name,
    // Quotation No., Destination AND Mobile Number are all searchable from
    // one shared index — used by both the Bookings list search below and
    // the Global Smart Search (see openGlobalSearch/renderGlobalSearchResults).
    idx=((b.guestName||'')+' '+(b.quotNo||'')+' '+(b.destination||'')+' '+(b.contact||'')).toLowerCase();
    _searchIdxCache.set(b,idx);
  }
  return idx;
}

// ────────────────────────────────────────────────────────────────────────
// Mobile Global Smart Search — DISPLAY ONLY, accessible from #globalSearchBtn
// in the header (visible on every page). Reuses the EXACT same search index
// (getSearchIdx) and substring-match predicate (.indexOf(q)>=0) that the
// Bookings list search above already uses — no second/duplicate filtering
// implementation. It reads only the already-loaded APP.bookings array (same
// in-memory data the rest of the app already works from offline), so it
// needs no network call and works offline exactly like the rest of the CRM.
// Tapping a result reuses the same "open this booking" pattern already used
// by every other booking card in the app (bList/bDash/etc): clone into
// APP.edit, set APP.ftab, call go('form').
// ────────────────────────────────────────────────────────────────────────
// Wraps the first substring match of q inside text with <mark> for visual
// highlighting. Pure display helper — not a filter, doesn't decide matches.
function highlightMatch(text,q){
  text=text==null?'':String(text);
  if(!q) return text;
  var i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return text;
  return text.slice(0,i)+'<mark class="gs-mark">'+text.slice(i,i+q.length)+'</mark>'+text.slice(i+q.length);
}
function renderGlobalSearchResults(q){

  var results=(APP.bookings||[]).filter(function(b){return getSearchIdx(b).indexOf(q.toLowerCase())>=0;}).slice(0,20);
  if(!results.length){box.innerHTML='<div class="gs-hint">No bookings found for "'+q.replace(/</g,'&lt;')+'"</div>';return;}
  var frag=document.createDocumentFragment();

      +'<div style="min-width:0">'
      +'<div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+highlightMatch(b.guestName||'—',q)+'</div>'
      +'<div style="font-size:11px;color:#8A8090;margin-top:3px">'+highlightMatch(b.quotNo||'—',q)+' &bull; '+highlightMatch(b.destination||'—',q)+'</div>'
      +(b.contact?'<div style="font-size:11px;color:#8A8090;margin-top:2px">&#9990; '+highlightMatch(b.contact,q)+'</div>':'')
      +'</div></div>'

}

// Accepts flexible column headers (any case, any order) and maps
// them to the hotel record fields used throughout the app.
function normalizeHotelRow(row){
  var out={name:'',place:'',cat:'',ph:'',em:'',stars:3};
  Object.keys(row).forEach(function(key){
    var k=key.toLowerCase().trim();
    var v=String(row[key]||'').trim();
    if(!v)return;
    if(k.indexOf('name')>=0) out.name=v;
    else if(k.indexOf('place')>=0||k.indexOf('city')>=0||k.indexOf('location')>=0||k.indexOf('destination')>=0) out.place=v;
    else if(k.indexOf('cat')>=0||k.indexOf('type')>=0) out.cat=v;
    else if(k.indexOf('phone')>=0||k.indexOf('contact')>=0||k.indexOf('mobile')>=0||k==='ph') out.ph=v;
    else if(k.indexOf('mail')>=0) out.em=v;
    else if(k.indexOf('star')>=0||k.indexOf('rating')>=0) out.stars=parseInt(v)||3;
  });
  return out;
}

    var br=el('div');br.style.cssText='display:flex;gap:8px;margin-top:8px';

      if(!addSt.name.trim()){toast('Please enter a package name',false);return;}
      var list=loadPkgTemplates();
      addSt.name=addSt.name.trim();addSt.createdAt=now();
      list.push(addSt);
      savePkgTemplates(list);
      toast('✅ Package template saved');
      go('pkgTpl');
    }));
    br.appendChild(btn('Cancel','btn bm sm',function(){addSt=null;renderAdd();}));
    form.appendChild(br);addWrap.appendChild(form);
  }
  renderAdd();wrap.appendChild(addWrap);

  var listWrap=el('div');wrap.appendChild(listWrap);
  var editingId=null;

  function renderList(){
    listWrap.innerHTML='';
    var q=(searchSt.q||'').trim().toLowerCase();
    var list=(APP.pkgTemplates||[]).filter(function(t){
      if(!q)return true;
      return (t.name||'').toLowerCase().indexOf(q)>=0||(t.destination||'').toLowerCase().indexOf(q)>=0;
    });
    if(!list.length){
      listWrap.appendChild(div('font-size:12px;color:#8A8090;text-align:center;padding:20px',
        (APP.pkgTemplates||[]).length?'No templates match your search.':'No package templates yet. Create one above, or open a booking, go to its 📦 Package tab, and tap "Save as New Package Template".'));
      return;
    }
    list.forEach(function(t){
      var card=el('div');card.className='card';card.style.marginBottom='8px';
      if(editingId===t.id){
        // ── EDIT MODE ──
        var eSt={id:t.id,name:t.name,destination:t.destination||'',duration:t.duration||'',
          itinerary:applyItinTemplateDays(t.itinerary),inclusions:(t.inclusions||[]).slice(),
          exclusions:(t.exclusions||[]).slice(),terms:(t.terms||[]).slice(),
          remarks:t.remarks||'',paymentPolicy:t.paymentPolicy||'',createdAt:t.createdAt};
        card.appendChild(div('font-size:13px;font-weight:700;color:#D4A843;margin-bottom:8px','Edit Package Template'));
        card.appendChild(pkgTemplateFields(eSt));
        var ebr=el('div');ebr.style.cssText='display:flex;gap:8px;margin-top:8px';
        ebr.appendChild(btn('Save Changes','btn bg sm',function(){
          if(!eSt.name.trim()){toast('Please enter a package name',false);return;}
          eSt.name=eSt.name.trim();
          var updated=(APP.pkgTemplates||[]).map(function(x){return x.id===t.id?eSt:x;});
          editingId=null;savePkgTemplates(updated);go('pkgTpl');
        }));
        ebr.appendChild(btn('Cancel','btn bm sm',function(){editingId=null;renderList();}));
        card.appendChild(ebr);
      } else {
        // ── VIEW MODE ──
        var filled=(t.itinerary||[]).filter(function(d){return d;}).length;
        card.innerHTML='<div style="font-weight:700;font-size:14px">'+t.name+'</div>'
          +'<div style="font-size:11px;color:#8A8090;margin-top:4px">📍 '+(t.destination||'—')+'  &bull;  '+(t.duration||'—')+'</div>'
          +'<div style="font-size:11px;color:#8A8090;margin-top:2px">'+filled+' day(s) filled &bull; '+(t.inclusions||[]).length+' inclusion(s) &bull; '+(t.exclusions||[]).length+' exclusion(s)</div>';
        var btnRow=el('div');btnRow.style.cssText='display:flex;gap:8px;margin-top:8px;flex-wrap:wrap';
        btnRow.appendChild(btn('✏️ Edit','btn sm bn',function(){editingId=t.id;renderList();}));
        btnRow.appendChild(btn('⧉ Duplicate','btn sm og',function(){
          var copy=JSON.parse(JSON.stringify(t));
          copy.id=Date.now()+Math.random();copy.name=t.name+' (Copy)';copy.createdAt=now();
          savePkgTemplates((APP.pkgTemplates||[]).concat([copy]));
          toast('✅ Duplicated as "'+copy.name+'"');
          go('pkgTpl');
        }));
        btnRow.appendChild(btn('Remove','btn sm or',function(){
          confirmDialog('Delete package template "'+t.name+'"? Bookings that already copied it are not affected.',function(){
            savePkgTemplates((APP.pkgTemplates||[]).filter(function(x){return x.id!==t.id;}));
            go('pkgTpl');
          });
        }));
        card.appendChild(btnRow);
      }
      listWrap.appendChild(card);
    });
  }
  renderList();
  return wrap;
}

function bSyncPage(){
  var wrap=el('div');
  wrap.appendChild(div('font-size:18px;font-weight:800;color:#D4A843;margin-bottom:6px','📡 Sync & Storage'));

  // Status card
  var sc=el('div');sc.className='card';sc.style.cssText='border:1.5px solid '+(APP.online?'#2ECC71':'#E67E22')+'44;margin-bottom:14px';
  sc.innerHTML='<div style="font-size:14px;font-weight:700;color:'+(APP.online?'#2ECC71':'#E67E22')+';margin-bottom:6px">'+(APP.online?'🟢 Desktop Server Connected':'🟡 Offline Mode')+'</div>'
    +'<div style="font-size:12px;color:#8A8090;line-height:1.6">'
    +(APP.online
      ?'Data saves to <b style="color:#D4A843">data/bookings.json</b> on Desktop.<br>Mobile changes sync automatically when connected.'
      :'No server found. Data saves to <b style="color:#D4A843">mobile browser storage</b>.<br>Connect to Desktop WiFi to sync.')
    +'</div>';
  wrap.appendChild(sc);

  if(APP.online){
    var syncCard=el('div');syncCard.className='card';syncCard.style.marginBottom='12px';
    syncCard.appendChild(div('font-size:14px;font-weight:700;color:#2ECC71;margin-bottom:8px','⟳ WiFi Sync'));
    syncCard.appendChild(div('font-size:12px;color:#8A8090;margin-bottom:10px','Mobile local data will be merged with Desktop data/bookings.json. Newer record wins.'));
    syncCard.appendChild(btn('Sync Now','btn gn',doSync));
    if(APP.serverIp){
      syncCard.appendChild(div('font-size:11px;color:#8A8090;margin-top:8px','Connected to: http://'+APP.serverIp+':7842'));
    }
    wrap.appendChild(syncCard);
    // Import button for online mode (to import from offline file)
    var impCard=el('div');impCard.className='card';impCard.style.cssText='margin-bottom:12px;border:1.5px solid #3498DB44';
    impCard.appendChild(div('font-size:14px;font-weight:700;color:#3498DB;margin-bottom:4px','📥 Offline Data Import'));
    impCard.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:10px','Mobile offline file (content://) માંથી Export કરેલો data અહીં paste કરો — Desktop સાથે merge થઈ જશે'));
    impCard.appendChild(btn('📥 Import & Merge','btn bn',doImport));
    wrap.appendChild(impCard);
  } else {
    // Manual IP connect card
    var ipCard=el('div');ipCard.className='card';ipCard.style.cssText='margin-bottom:12px;border:1.5px solid #D4A84344';
    ipCard.appendChild(div('font-size:14px;font-weight:700;color:#D4A843;margin-bottom:6px','🖥️ Desktop Server Connect કરો'));
    ipCard.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:10px','Automatic ન થાય તો Desktop ની IP manually enter કરો — CMD → ipconfig → IPv4 Address'));
    var scanBtn=btn('🔍 Auto-Find Desktop (Scan WiFi)','btn sm bn',function(){
      scanBtn.textContent='🔍 Scanning...';scanBtn.disabled=true;
      scanNetwork(true).then(function(found){
        scanBtn.textContent='🔍 Auto-Find Desktop (Scan WiFi)';scanBtn.disabled=false;
        if(found){doSync();go('sync');}
      });
    });
    scanBtn.style.marginBottom='10px';
    ipCard.appendChild(scanBtn);
    var ipRow=el('div');ipRow.style.cssText='display:flex;gap:8px;align-items:center';
    var ipInp=el('input');ipInp.className='inp';ipInp.placeholder='192.168.29.61';
    ipInp.value=SAVED_IP||'192.168.29.61';
    ipInp.style.flex='1';
    var conBtn=btn('🔗 Connect','btn bg',function(){
      var ip=ipInp.value.trim();
      if(!ip){toast('IP enter કરો',false);return;}
      SAVED_IP=ip;LS.s('serverIp',ip);
      APP.serverIp=ip;
      toast('Connecting...');
      checkServer().then(function(ok){
        if(ok){toast('✅ Desktop connected!');doSync();go('sync');}
        else{toast('❌ Connect ન થઈ — Desktop server ચાલુ છે?',false);}
      });
    });
    ipRow.appendChild(ipInp);ipRow.appendChild(conBtn);
    ipCard.appendChild(ipRow);
    wrap.appendChild(ipCard);

    // WiFi instructions
    var wCard=el('div');wCard.className='card';wCard.style.marginBottom='12px';
    wCard.appendChild(div('font-size:14px;font-weight:700;color:#D4A843;margin-bottom:10px','📋 Steps:'));
    ['1. Desktop પર START_MISHRI_CRM.bat ચાલુ કરો','2. Desktop CMD માં ipconfig → IPv4 Address note કરો','3. ઉપર IP enter કરી Connect tap કરો','4. WiFi પર auto-sync, Mobile Data પર offline mode'].forEach(function(t){var d=el('div');d.style.cssText='font-size:12px;color:#E8E0D0;padding:7px 0;border-bottom:1px solid #2A2D3A44;line-height:1.5';d.textContent=t;wCard.appendChild(d);});
    wrap.appendChild(wCard);
  }

  // ── MANUAL EXPORT/IMPORT ──────────────────────────────────
  var xCard=el('div');xCard.className='card';xCard.style.cssText='margin-bottom:12px;border:1.5px solid #D4A84344';
  xCard.appendChild(div('font-size:14px;font-weight:700;color:#D4A843;margin-bottom:4px','📤 Manual Transfer'));
  xCard.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:12px','WiFi ન હોય ત્યારે — Mobile Data પર data transfer કરો'));
  var expSec=el('div');expSec.style.cssText='background:#0F1117;border-radius:8px;padding:10px;margin-bottom:8px';
  expSec.appendChild(div('font-size:12px;font-weight:700;color:#2ECC71;margin-bottom:4px','📱 → 🖥️  Mobile થી Desktop'));
  expSec.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:8px','Mobile offline file માં data છે? Export કરો → Desktop માં Import કરો'));
  expSec.appendChild(btn('📤 Export (Mobile Data Copy કરો)','btn gn',doExport));
  xCard.appendChild(expSec);
  var impSec=el('div');impSec.style.cssText='background:#0F1117;border-radius:8px;padding:10px';
  impSec.appendChild(div('font-size:12px;font-weight:700;color:#3498DB;margin-bottom:4px','🖥️ → 📱  Desktop થી Mobile'));
  impSec.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:8px','Desktop નો data Mobile માં લાવવો છે? Desktop Export → અહીં Import'));
  impSec.appendChild(btn('📥 Import (Desktop Data Paste કરો)','btn bn',doImport));
  xCard.appendChild(impSec);
  wrap.appendChild(xCard);

  // How data works
  var hCard=el('div');hCard.className='card';
  hCard.appendChild(div('font-size:14px;font-weight:700;color:#D4A843;margin-bottom:10px','💾 Data Storage'));
  hCard.innerHTML+=''
    +'<div style="background:#0F1117;border-radius:8px;overflow:hidden">'
    +'<div style="padding:10px 12px;border-bottom:1px solid #2A2D3A"><div style="font-size:12px;font-weight:700;color:#E8E0D0;margin-bottom:3px">🖥️ Desktop (Server ON)</div><div style="font-size:11px;color:#8A8090">data/bookings.json — permanent file</div><div style="font-size:11px;color:#2ECC71">✅ Never lost, editable in Notepad</div></div>'
    +'<div style="padding:10px 12px;border-bottom:1px solid #2A2D3A"><div style="font-size:12px;font-weight:700;color:#E8E0D0;margin-bottom:3px">📱 Mobile (Offline)</div><div style="font-size:11px;color:#8A8090">Browser localStorage — works without server</div><div style="font-size:11px;color:#E67E22">⚠ Clear browser = data lost (sync first!)</div></div>'
    +'<div style="padding:10px 12px"><div style="font-size:12px;font-weight:700;color:#E8E0D0;margin-bottom:3px">🔄 When WiFi connects</div><div style="font-size:11px;color:#8A8090">Auto-merge — newer record wins — both synced</div><div style="font-size:11px;color:#2ECC71">✅ No data lost from either device</div></div>'
    +'</div>';
  wrap.appendChild(hCard);
  return wrap;
}

// ── LOGIN SCREEN (cloud mode only) ────────────────────────────
function showLoginScreen(msg){
  var old=document.getElementById('loginScreen');if(old)old.remove();
  var wrap=document.createElement('div');
  wrap.id='loginScreen';
  wrap.style.cssText='position:fixed;inset:0;background:#0F1117;z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px';
  wrap.innerHTML=''
    +'<div style="width:100%;max-width:340px;text-align:center">'
    +'<div style="font-size:40px;margin-bottom:6px">✈️</div>'
    +'<div style="font-family:Georgia,serif;font-style:italic;font-size:22px;font-weight:900;color:#D4A843;margin-bottom:4px">Mishri Holidays</div>'
    +'<div style="font-size:12px;color:#8A8090;margin-bottom:22px">Enter password to continue</div>'
    +(msg?'<div style="color:#E74C3C;font-size:12px;margin-bottom:12px">'+msg+'</div>':'')
    +'<input type="password" id="loginPass" placeholder="Password" style="width:100%;padding:12px 14px;border-radius:8px;border:1.5px solid #2A2D3A;background:#1A1D27;color:#E8E0D0;font-size:14px;margin-bottom:12px;box-sizing:border-box">'
    +'<button id="loginBtn" style="width:100%;padding:12px;border-radius:8px;border:none;background:#D4A843;color:#1a1d27;font-weight:700;font-size:14px;cursor:pointer">Unlock</button>'
    +'</div>';
  document.body.appendChild(wrap);
  var passInput=document.getElementById('loginPass');
  var goBtn=document.getElementById('loginBtn');
  function attempt(){
    var pw=passInput.value;
    if(!pw)return;
    goBtn.textContent='Checking...';goBtn.disabled=true;
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})})
      .then(function(r){return r.json();})
      .then(function(res){
        if(res.ok&&res.token){
          APP.authToken=res.token;LS.s('authToken',res.token);
          wrap.remove();
          init();
        } else {
          goBtn.textContent='Unlock';goBtn.disabled=false;
          showLoginScreen(res.error||'Wrong password');
        }
      }).catch(function(){
        goBtn.textContent='Unlock';goBtn.disabled=false;
        showLoginScreen('Network error — check internet connection');
      });
  }
  goBtn.onclick=attempt;
  passInput.onkeydown=function(e){if(e.key==='Enter')attempt();};
  passInput.focus();
}

// ── BOOT: password gate active for hosted/cloud mode (data safety) ──
function boot(){
  if(REQUIRES_LOGIN && !APP.authToken){
    showLoginScreen();
  } else {
    init();
  }
}


// ── BOOT ────────────────────────────────────────────────
boot();
</script>
