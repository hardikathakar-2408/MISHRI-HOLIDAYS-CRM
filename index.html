<script>
// Register service worker (enables install prompt + offline app shell)
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){/* not fatal */});
  });
}

// Track install prompt
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredPrompt=e;
  setTimeout(function(){
    var btn=document.getElementById('installBtn');
    if(btn)btn.style.display='flex';
  },1000);
});
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0F1117;color:#E8E0D0;font-family:'Segoe UI',Arial,sans-serif}
input,select,button{font-family:inherit}
#app{display:flex;flex-direction:column;height:100dvh}
#hdr{background:#1A1D27;border-bottom:1px solid #2A2D3A;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 96px;scroll-behavior:smooth}
#content.form-open{padding-bottom:88px}
/* Bottom nav — bigger thumb targets, clear active state, safe-area aware */
#nav{position:fixed;bottom:0;left:0;right:0;background:#1A1D27;border-top:1px solid #2A2D3A;display:grid;grid-template-columns:repeat(4,1fr);z-index:100;padding-bottom:env(safe-area-inset-bottom);height:calc(62px + env(safe-area-inset-bottom))}

<script>
"use strict";
// ════════════════════════════════════════════════════════════
//  MISHRI HOLIDAYS CRM
//  Storage:
//    Desktop  → data/bookings.json  (via server API)
//    Mobile   → localStorage        (offline)
//    WiFi on  → auto-sync + merge   (newer record wins)
// ════════════════════════════════════════════════════════════

var MEALS=['CP','MAP','AP','EP','AI'];
var ROOM_CATS=['Deluxe','Super Deluxe','Suite','Premium','Standard','Executive','Club Room','Sea View','Pool View','Garden View','Cottage','Villa'];
var STATUSES=['Quotation','Confirmed','Completed','Cancelled'];
var DEF_HOTELS=[
  {id:1,name:'Amara Grand',place:'Goa',cat:'Premium',ph:'+91 832 246 8800',em:'reservations@amaragrand.com',stars:5},
  {id:2,name:'Cidade de Goa',place:'Goa',cat:'Luxury',ph:'+91 832 245 4545',em:'info@cidadedegoa.com',stars:5},
  {id:3,name:'The Leela Palace',place:'Udaipur',cat:'Luxury',ph:'+91 294 670 1234',em:'reservations@theleela.com',stars:5},
  {id:4,name:'Rambagh Palace',place:'Jaipur',cat:'Luxury',ph:'+91 141 221 1919',em:'rambagh@tajhotels.com',stars:5},
  {id:5,name:'Radisson Blu',place:'Shimla',cat:'Standard',ph:'+91 177 665 4444',em:'shimla@radissonblu.com',stars:4},
  {id:6,name:'Wildflower Hall',place:'Shimla',cat:'Luxury',ph:'+91 177 264 8585',em:'wildflower@oberoihotels.com',stars:5},
  {id:7,name:'Ibis Styles',place:'Goa',cat:'Budget',ph:'+91 832 671 2345',em:'goa@ibishotels.com',stars:3},
  {id:8,name:'Alsisar Haveli',place:'Jaipur',cat:'Heritage',ph:'+91 141 236 8290',em:'info@alsisarhaveli.com',stars:4}
];

// ══════════════════════════════════════════════════════════════
//  STORAGE — IndexedDB (primary) + localStorage (fallback)
//  IndexedDB survives "Clear browsing history" on Android Chrome
// ══════════════════════════════════════════════════════════════
var IDB={db:null};
function idbOpen(){
  return new Promise(function(res){
    if(IDB.db){res(IDB.db);return;}
    if(!window.indexedDB){res(null);return;}
    var req=indexedDB.open('MishriCRM',2);
    req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');};
    req.onsuccess=function(e){IDB.db=e.target.result;res(IDB.db);};
    req.onerror=function(){res(null);};
  });
}
function idbSet(k,v){
  return idbOpen().then(function(db){
    if(!db)return;
    return new Promise(function(res){
      var tx=db.transaction('kv','readwrite');
      tx.objectStore('kv').put(JSON.stringify(v),'mc_'+k);
      tx.oncomplete=res;tx.onerror=res;
    });
  });
}
function idbGet(k){
  return idbOpen().then(function(db){
    if(!db)return null;
    return new Promise(function(res){
      var tx=db.transaction('kv','readonly');
      var req=tx.objectStore('kv').get('mc_'+k);
      req.onsuccess=function(){try{res(req.result?JSON.parse(req.result):null);}catch(e){res(null);}};
      req.onerror=function(){res(null);};
    });
  });
}
var LS={
  g:function(k){try{var d=localStorage.getItem('mc_'+k);if(d)return JSON.parse(d);}catch(e){}return null;},
  s:function(k,v){try{localStorage.setItem('mc_'+k,JSON.stringify(v));}catch(e){}idbSet(k,v).catch(function(){});}
};
function restoreFromIDB(){
  var keys=['bookings','hotels','serverIp'];
  return Promise.all(keys.map(function(k){
    return idbGet(k).then(function(val){
      if(val!==null){
        try{if(!localStorage.getItem('mc_'+k)){localStorage.setItem('mc_'+k,JSON.stringify(val));}}catch(e){}
      }
    });
  }));
}
function requestPersist(){
  if(navigator.storage&&navigator.storage.persist){
    navigator.storage.persist().then(function(g){if(g)console.log('MishriCRM: Persistent storage granted');});
  }
}

// ── APP STATE ───────────────────────────────────────────────
var APP={
  page:'dash',
  bookings:[],
  hotels:LS.g('hotels')||DEF_HOTELS,
  edit:null,
  ftab:'guest',
  online:false,      // is server reachable?
  useRelative:false, // true = cloud (Netlify) or same-origin desktop server
  serverIp:null,
  authToken:LS.g('authToken')||null,
  pendingSync:false  // local changes not yet synced
};
var REQUIRES_LOGIN = false; // password gateway disabled

// ── TIMESTAMP ───────────────────────────────────────────────
function now(){return new Date().toISOString();}

// ── TOAST ───────────────────────────────────────────────────
function toast(msg,ok){
  document.querySelectorAll('.toast').forEach(function(t){t.remove();});
  var t=document.createElement('div');t.className='toast';
  t.style.background=(ok===false)?'#E74C3C':'#2ECC71';t.style.color='#fff';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},2800);
}

// ── STATUS BAR ──────────────────────────────────────────────
function updateStatusBar(){
  var el=document.getElementById('syncStatus');
  var sb=document.getElementById('syncBtn');
  if(!el)return;
  if(APP.online){
    el.style.color='#2ECC71';
    el.textContent=APP.useRelative?'● Online — synced to cloud':'● Desktop server connected — data/bookings.json';
    if(sb) sb.style.display='';
  } else {
    el.style.color='#E67E22';
    el.textContent='● Offline — data saved locally';
    if(sb) sb.style.display='none';
  }
}

// ── SERVER CHECK ────────────────────────────────────────────
// Tries: 1) saved IP, 2) relative URL (when hosted on desktop itself)
var SAVED_IP=LS.g('serverIp')||null;
var SERVER_CANDIDATES=[];

function buildCandidates(){
  var c=[];
  if(SAVED_IP) c.push('http://'+SAVED_IP+':7842');
  // If served from desktop directly, relative works
  if(window.location.hostname!=='localhost'&&window.location.port==='7842'){
    c.push(window.location.origin);
  }
  // Common home router subnets to scan
  var subnets=['192.168.29','192.168.1','192.168.0','10.0.0'];
  subnets.forEach(function(s){
    if(SAVED_IP&&SAVED_IP.startsWith(s)) return; // already added
    c.push('http://'+s+'.1:7842'); // try .1 as fallback
  });
  return c;
}

function tryUrl(url){
  return fetch(url+'/api/ip',{
    signal:AbortSignal.timeout?AbortSignal.timeout(1500):undefined,
    mode:'cors'
  }).then(function(r){return r.json();})
    .then(function(d){return {ok:true,ip:d.ip,base:url};});
}

function checkServer(){
  // 1) Try same-origin first — this covers BOTH:
  //    a) App deployed on Netlify (mobile & desktop both hit the same cloud URL)
  //    b) App served by the desktop LAN server itself (port 7842)
  return tryUrl(window.location.origin).then(function(res){
    res.relative=true;return res;
  }).catch(function(){
    // 2) Fall back to LAN discovery (saved IP / subnet guesses) —
    //    only relevant when the app was opened as a local file on mobile
    //    and is pairing with a desktop server on the same WiFi.
    var candidates=buildCandidates();
    var chain=Promise.reject(new Error('start'));
    candidates.slice(0,4).forEach(function(url){
      chain=chain.catch(function(){return tryUrl(url);});
    });
    return chain;
  }).then(function(res){
    APP.online=true;
    APP.useRelative=!!res.relative;
    if(APP.useRelative){
      APP.serverIp='cloud';
    } else {
      APP.serverIp=res.ip||res.base.replace('http://','').replace(':7842','');
      SAVED_IP=APP.serverIp;
      LS.s('serverIp',SAVED_IP);
    }
    updateStatusBar();return true;
  }).catch(function(){APP.online=false;updateStatusBar();return false;});
}

// ── LAN AUTO-DISCOVERY (zero-config pairing) ─────────────────
// Tries to find the desktop server on the same WiFi automatically,
// without the user having to type in an IP address.
function getLocalIP(){
  return new Promise(function(resolve){
    try{
      var RTCPeerConnection=window.RTCPeerConnection||window.mozRTCPeerConnection||window.webkitRTCPeerConnection;
      if(!RTCPeerConnection){resolve(null);return;}
      var pc=new RTCPeerConnection({iceServers:[]});
      var done=false;
      pc.createDataChannel('');
      pc.onicecandidate=function(e){
        if(done||!e.candidate)return;
        var m=/([0-9]{1,3}(?:\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
        if(m&&m[1]!=='0.0.0.0'){done=true;try{pc.close();}catch(e2){}resolve(m[1]);}
      };
      pc.createOffer().then(function(o){return pc.setLocalDescription(o);}).catch(function(){if(!done){done=true;resolve(null);}});
      setTimeout(function(){if(!done){done=true;try{pc.close();}catch(e3){}resolve(null);}},1200);
    }catch(e){resolve(null);}
  });
}
function scanRange(prefix,start,end,port){
  return new Promise(function(resolve){
    var found=false,i=start,batchSize=40;
    function nextBatch(){
      if(found)return;
      if(i>end){if(!found)resolve(null);return;}
      var batch=[];
      for(var k=0;k<batchSize&&i<=end;k++,i++){
        (function(ip){
          batch.push(tryUrl('http://'+prefix+'.'+ip+':'+port).then(function(res){
            if(!found){found=true;resolve(res);}
          }).catch(function(){}));
        })(i);
      }
      Promise.all(batch).then(function(){if(!found)nextBatch();});
    }
    nextBatch();
  });
}
function scanNetwork(showToast){
  if(showToast)toast('🔍 Desktop shodhi rahya chhiye (WiFi scan)...');
  return getLocalIP().then(function(ip){
    var prefixes=[];
    if(ip){var p=ip.split('.');if(p.length===4)prefixes.push(p[0]+'.'+p[1]+'.'+p[2]);}
    ['192.168.1','192.168.0','192.168.29','192.168.225','192.168.43','10.0.0'].forEach(function(pr){
      if(prefixes.indexOf(pr)<0)prefixes.push(pr);
    });
    var chain=Promise.resolve(null);
    prefixes.forEach(function(prefix){
      chain=chain.then(function(res){if(res)return res;return scanRange(prefix,1,254,7842);});
    });
    return chain;
  }).then(function(res){
    if(res&&res.ip){
      APP.online=true;APP.useRelative=false;APP.serverIp=res.ip;SAVED_IP=res.ip;LS.s('serverIp',res.ip);
      updateStatusBar();
      if(showToast)toast('✅ Desktop connected! '+res.ip);
      return true;
    } else {
      if(showToast)toast('Desktop na malyu — IP manually nakho',false);
      return false;
    }
  });
}

// ── CALC ────────────────────────────────────────────────────
function nts(a,b){if(!a||!b)return 0;var d=(new Date(b)-new Date(a))/86400000;return d>0?Math.round(d):0;}
function calcOpt(b,idx){
  var opt=b['opt'+idx]||[];
  var adults=parseInt(b.adults)||0;
  var chargeableChild=Math.max(0,(parseInt(b.children)||0)-(parseInt(b.compChildren)||0));

  // Hotel cost — adult portion (rooms + extra adults + mattress)
  // Child cost — child rate portion (separate)
  var hotelAdultCost=0;
  var hotelChildCost=0;
  var roomCost=0,extraAdultCost=0,mattressCost=0,childCost=0;
  var maxExtraAdults=0,maxExtraMattress=0,maxHotelChargeableChild=0;
  for(var i=0;i<opt.length;i++){
    var h=opt[i];
    if(!h.hotelName||!h.checkIn||!h.checkOut)continue;
    var n=nts(h.checkIn,h.checkOut);
    var hExtraAdults=parseInt(h.extraAdults)||0;
    var hMattress=parseInt(h.extraMattress)||0;
    var hChild=parseInt(h.chargeableChild)||0;
    // Bug fix (1): Mattress Rate field removed — extra-mattress guests are already
    // charged via the Extra Adult / Chargeable Child rate, so no separate mattress
    // cost is added here (kept at 0 to avoid double-charging). Qty is still tracked
    // for display purposes only.
    roomCost+=n*(parseInt(h.rooms)||1)*(parseFloat(h.ratePerRoom)||0);
    extraAdultCost+=n*hExtraAdults*(parseFloat(h.extraAdultRate)||0);
    // Child cost is SEPARATE
    childCost+=n*hChild*(parseFloat(h.childRate)||0);
    if(hExtraAdults>maxExtraAdults)maxExtraAdults=hExtraAdults;
    if(hMattress>maxExtraMattress)maxExtraMattress=hMattress;
    if(hChild>maxHotelChargeableChild)maxHotelChargeableChild=hChild;
  }
  hotelAdultCost=roomCost+extraAdultCost+mattressCost;
  hotelChildCost=childCost;
  var hotelCost=hotelAdultCost+hotelChildCost; // total hotel
  // Use the hotel-level chargeable-children qty (per-option, entered on the Hotels tab)
  // when present — falls back to Guest-tab Children minus Comp. 0-5 Yrs otherwise.
  // This is what was causing chargeable-child costing to silently disappear from quotations.
  if(maxHotelChargeableChild>0) chargeableChild=maxHotelChargeableChild;

  var vehCost=0;
  (b.vehicles||[]).forEach(function(v){vehCost+=parseFloat(v.cost)||0;});

  var mkPct=parseFloat(b['mkPct'+idx])||0;
  var mkFixed=parseFloat(b['mkFixed'+idx])||0;
  var misc=parseFloat(b['misc'+idx])||0;
  // GST — selectable per option as 0% / 5% / 18% (some quotations are given without GST)
  var gstPct=parseFloat(b['gstPct'+idx])||0;

  // Adult base = adult hotel + vehicle
  var adultBase=hotelAdultCost+vehCost;
  var adultMarkup=adultBase*(mkPct/100)+mkFixed;
  var adultMisc=parseFloat(misc)||0;
  var subTotalAdult=adultBase+adultMarkup+adultMisc;
  var gstAmtAdult=subTotalAdult*(gstPct/100);
  var grandTotalAdult=subTotalAdult+gstAmtAdult;
  // Fix: "Adults" on the Guest tab is already the TOTAL pax count (e.g. 14).
  // "Extra Adults" on the Hotel tab is just a subset of that total used to
  // split the room rate vs extra-adult rate (e.g. 5 rooms x 2 base = 10,
  // remaining 4 of the 14 charged as Extra Adults) — it is NOT additional
  // people on top of Adults. So the per-adult split uses Adults as-is;
  // adding Extra Adults again double-counts them (14+4=18, wrongly
  // inflating the head count and shrinking the per-adult figure).
  var totalAdultHeads=adults;
  var perAdult=totalAdultHeads>0?Math.round(grandTotalAdult/totalAdultHeads):0;

  // Child base = child hotel only (vehicle already in adult cost)
  var childMarkup=hotelChildCost*(mkPct/100);
  var subTotalChild=hotelChildCost+childMarkup;
  var gstAmtChild=subTotalChild*(gstPct/100);
  var grandTotalChild=subTotalChild+gstAmtChild;
  var perChild=chargeableChild>0?Math.round(grandTotalChild/chargeableChild):0;

  // Grand total = adult total + child total (GST included)
  var grandTotal=grandTotalAdult+grandTotalChild;
  var base=adultBase; // for display
  var markupAmt=adultMarkup+childMarkup;
  var gstAmt=gstAmtAdult+gstAmtChild;
  var subTotal=subTotalAdult+subTotalChild; // pre-GST total

  return{
    hotelCost:hotelCost,hotelAdultCost:hotelAdultCost,hotelChildCost:hotelChildCost,
    vehCost:vehCost,base:base,markupAmt:markupAmt,misc:misc,
    gstPct:gstPct,gstAmt:gstAmt,subTotal:subTotal,
    grandTotal:grandTotal,grandTotalAdult:grandTotalAdult,grandTotalChild:grandTotalChild,
    perAdult:perAdult,perChild:perChild,
    chargeableChild:chargeableChild,adults:totalAdultHeads,baseAdults:adults,
    markupFromPct:adultBase*(mkPct/100),mkFixed:mkFixed,
    roomCost:roomCost,extraAdultCost:extraAdultCost,mattressCost:mattressCost,childCost:childCost,
    maxExtraAdults:maxExtraAdults,maxExtraMattress:maxExtraMattress
  };
}
function fmt(n){return '\u20b9'+Math.round(n||0).toLocaleString('en-IN');}
function fmtD(d){if(!d)return '\u2014';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}
// Bug fix (5): format a "HH:MM" time value as a friendly 12-hour AM/PM string for the voucher
function fmtT(t){
  if(!t) return '';
  var m=String(t).match(/^(\d{1,2}):(\d{2})/);
  if(!m) return t;
  var h=parseInt(m[1],10),min=m[2];
  var ap=h>=12?'PM':'AM';
  var h12=h%12; if(h12===0)h12=12;
  return h12+':'+min+' '+ap;
}
// Bug fix (5): Show the full meaning of the meal-plan code in brackets, e.g. "MAP (Breakfast and Dinner)"
var MEAL_PLAN_LABELS={CP:'Breakfast Only',MAP:'Breakfast and Dinner',AP:'Breakfast, Lunch and Dinner',EP:'No Meals',AI:'All Inclusive'};
function mealLabel(code){
  if(!code) return '\u2014';
  var key=String(code).toUpperCase();
  var l=MEAL_PLAN_LABELS[key];
  return l?(key+' ('+l+')'):code;
}
// Bug fix (3): Use the vehicle type(s) actually entered on the Vehicle tab instead of a hardcoded name.
function vehicleTypeLabel(vehs){

function emH(){return{place:'',hotelName:'',roomCat:'',checkIn:'',checkOut:'',checkInTime:'14:00',checkOutTime:'12:00',confirmNo:'',address:'',phone:'',rooms:1,mealPlan:'CP',ratePerRoom:0,extraMattress:0,mattressRate:0,extraAdults:0,extraAdultRate:0,chargeableChild:0,childRate:0};}
function emV(){return{type:'',vehicleNo:'',from:'',to:'',cost:0};}
function isBlankHotel(h){return h && !h.hotelName && !h.place && !(parseFloat(h.ratePerRoom)>0);}
function isBlankVehicle(v){return v && !v.type && !v.vehicleNo && !(parseFloat(v.cost)>0);}
// Trims trailing empty hotel rows (kept in sync across opt1/2/3 by index) so an old
// booking that still has 8 pre-created blank slots doesn't render 24 empty rows —
// always leaves at least 1 row per option.
function trimHotelRows(b){
  // Only trim once per edit session — otherwise a row the agent just added via
  // "+ Add Hotel" (still blank until they type into it) would get collapsed away
  // again the next time this tab/panel re-renders.
  if(b._hotelsTrimmed)return;
  b._hotelsTrimmed=true;
  ['opt1','opt2','opt3'].forEach(function(k){if(!b[k]||!b[k].length)b[k]=[emH()];});
  var last=-1;
  for(var i=0;i<Math.max(b.opt1.length,b.opt2.length,b.opt3.length);i++){
    var blank=isBlankHotel(b.opt1[i])&&isBlankHotel(b.opt2[i])&&isBlankHotel(b.opt3[i]);
    if(!blank)last=i;
  }
  var keep=Math.max(1,last+1);
  ['opt1','opt2','opt3'].forEach(function(k){b[k]=b[k].slice(0,keep);while(b[k].length<keep)b[k].push(emH());});
}
function trimVehicleRows(b){
  if(b._vehTrimmed)return;
  b._vehTrimmed=true;
  if(!b.vehicles||!b.vehicles.length){b.vehicles=[emV()];return;}
  var last=-1;
  b.vehicles.forEach(function(v,i){if(!isBlankVehicle(v))last=i;});
  b.vehicles=b.vehicles.slice(0,Math.max(1,last+1));
}
function addHotelRow(b){

  // hotel so multi-city itineraries don't need the same numbers typed again — the
  // agent only edits what's actually different (usually just the city + hotel name).
  var nh=emH();

  nh.extraAdults=last1.extraAdults||0;
  nh.extraMattress=last1.extraMattress||0;

  if(last1.checkOut){nh.checkIn=last1.checkOut;var d=new Date(last1.checkOut);if(!isNaN(d)){d.setDate(d.getDate()+1);nh.checkOut=d.toISOString().slice(0,10);}}
  [1,2,3].forEach(function(n){var arr=b['opt'+n];var row=(n===1)?nh:JSON.parse(JSON.stringify(nh));if(n!==1){row.hotelName='';row.roomCat='';row.ratePerRoom=0;row.extraAdultRate=0;row.childRate=0;}arr.push(row);});
}
function removeHotelRow(b,idx){

}
function addVehicleRow(b){b.vehicles.push(emV());}

// Bug fix: a random quotNo can collide with an existing booking's quotNo. Since saveBooking()
// matches records by quotNo, a collision would silently overwrite a different guest's booking

// ── SERVER BASE URL ──────────────────────────────────────────
function getBase(){
  if(APP.useRelative) return ""; // Netlify (cloud) or desktop serving app on :7842 — same-origin
  if(APP.serverIp) return "http://"+APP.serverIp+":7842"; // LAN desktop server
  return "";
}

// ── AUTHENTICATED API FETCH ───────────────────────────────────
// Adds the login token (cloud mode only) to every API call, and
// forces re-login if the server says the token is invalid/expired.
function apiFetch(path, opts){
  opts=opts||{};
  opts.headers=opts.headers||{};
  if(APP.useRelative && APP.authToken){
    opts.headers['Authorization']='Bearer '+APP.authToken;
  }
  return fetch(getBase()+path, opts).then(function(r){
    if(r.status===401){
      APP.authToken=null;LS.s('authToken',null);
      showLoginScreen();
      throw new Error('unauthorized');
    }
    return r;
  });
}

// Load bookings: server if online, else localStorage
function loadBookings(){
  if(APP.online){
    return apiFetch('/api/bookings').then(function(r){return r.json();})
      .then(function(list){
        APP.bookings=list||[];
        LS.s('bookings',APP.bookings); // mirror to local
        return APP.bookings;
      }).catch(function(){
        APP.bookings=LS.g('bookings')||[];
        return APP.bookings;
      });
  } else {
    APP.bookings=LS.g('bookings')||[];
    return Promise.resolve(APP.bookings);
  }
}

// Save one booking: server + local mirror
function saveBooking(b){
  b.updatedAt=now();
  // Always save to localStorage immediately
  var local=APP.bookings.slice();
  var idx=-1;
  for(var i=0;i<local.length;i++){if(local[i].quotNo===b.quotNo){idx=i;break;}}
  var copy=JSON.parse(JSON.stringify(b));
  if(idx>=0) local[idx]=copy; else local.unshift(copy);
  APP.bookings=local;
  LS.s('bookings',local);

  if(APP.online){
    return apiFetch('/api/bookings/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(copy)})
      .then(function(r){return r.json();})
      .then(function(){toast('✅ Saved — desktop file updated!');return true;})
      .catch(function(){toast('💾 Saved locally (server unreachable)');APP.pendingSync=true;return false;});
  } else {
    toast('💾 Saved locally — sync when online');
    APP.pendingSync=true;
    return Promise.resolve(false);
  }
}

// Delete booking
function deleteBooking(qn){
  APP.bookings=APP.bookings.filter(function(b){return b.quotNo!==qn;});
  LS.s('bookings',APP.bookings);
  if(APP.online){
    apiFetch('/api/bookings/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({quotNo:qn})}).catch(function(){});
  }
  toast('Deleted');
}

// ── SYNC: send local → server, get merged back ──────────────
function doSync(silent){
  if(!APP.online){if(!silent)toast('Not connected to server',false);return Promise.resolve(false);}
  var local=LS.g('bookings')||[];
  if(!silent)toast('Syncing...');
  return apiFetch('/api/bookings/sync',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({bookings:local})
  }).then(function(r){return r.json();})
  .then(function(res){
    if(res.ok&&res.bookings){
      var changed=JSON.stringify(res.bookings)!==JSON.stringify(APP.bookings);
      APP.bookings=res.bookings;
      LS.s('bookings',res.bookings);
      APP.pendingSync=false;
      if(!silent){
        toast('✅ Synced! '+res.bookings.length+' bookings');
        go(APP.page);
      } else if(changed && (APP.page==='list'||APP.page==='dash')){
        // Refresh the currently visible screen quietly if new data arrived from desktop
        go(APP.page);
      }
      return true;
    }
    return false;
  }).catch(function(){if(!silent)toast('Sync failed',false);return false;});
}

      var merged=Object.values(map).sort(function(a,b){return new Date(b.updatedAt)-new Date(a.updatedAt);});

      // If online, also sync to server
      if(APP.online){

// ── INIT: check server, load data ───────────────────────────
function init(){
  // Step 1: Request persistent storage (prevents browser from clearing data)
  requestPersist();
  // Step 2: Restore from IndexedDB into localStorage if localStorage was cleared
  restoreFromIDB().then(function(){
    // Step 3: Reload hotels from restored storage
    APP.hotels=LS.g('hotels')||DEF_HOTELS;
    // Step 4: Check server & load data
    return checkServer();
  }).then(function(){
    return Promise.all([loadBookings(), loadHotels()]);
  }).then(function(){
    if(APP.online && APP.pendingSync) doSync();
    else go('dash');
    // Show restore notice if we recovered from IDB
    idbGet('bookings').then(function(idbData){
      var lsData=LS.g('bookings')||[];
      if(idbData&&idbData.length>0&&lsData.length===0){
        toast('🔄 Data recovered from backup!');
      }
    });
    // Step 5: If desktop wasn't found via saved IP, try a one-time
    // background network scan for zero-config pairing — doesn't block the UI.
    if(!APP.online){
      scanNetwork(false).then(function(found){
        if(found){ doSync(true); }
      });
    }
  }).catch(function(){
    // Likely a 401 (expired/invalid token) — apiFetch already triggered
    // the login screen, so there's nothing else to do here.
  });
}

// ── PERIODIC BACKGROUND SYNC (every 20s while app is open) ───
setInterval(function(){
  var wasOnline=APP.online;
  checkServer().then(function(isOnline){
    if(isOnline){
      if(!wasOnline)toast('🔗 Connected to desktop!');
      doSync(true); // silent — keeps mobile & desktop continuously in sync
    } else if(!wasOnline){
      // still offline — occasionally retry a full network scan in the background
      scanNetwork(false);
    }
  });
}, 20000);

// ── INSTANT RE-SYNC WHEN APP COMES BACK TO FOREGROUND ────────
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible'){
    checkServer().then(function(isOnline){ if(isOnline) doSync(true); });
  }
});

function el(tag){return document.createElement(tag);}
function div(css,html){var d=el('div');if(css)d.style.cssText=css;if(html)d.innerHTML=html;return d;}
function inp(val,setter,type,ph){
  var i=el('input');i.className='inp';i.type=type||'text';
  i.value=(val!==undefined&&val!==null)?String(val):'';
  if(ph)i.placeholder=ph;
  // Bug fix: commit the value on every keystroke (not just on 'change'/blur).
  // Previously the value was only saved to the booking object on 'change', which only
  // fires once the field loses focus. Tapping "Save" while a field was still focused
  // (very common on mobile) would just blur the field on the first tap without
  // reaching the Save button — so the user had to tap Save a second time before the
  // data actually got written. Using 'input' means the latest value is always already
  // on the object by the time Save is tapped, so a single tap saves correctly.
  i.addEventListener('input',function(){var v=i.value;if(type==='number')v=parseFloat(v)||0;setter(v);});
  return i;
}
function sel(val,opts,setter){
  var s=el('select');s.className='sel';
  opts.forEach(function(o){var op=el('option');op.value=o.v!==undefined?o.v:o;op.textContent=o.l!==undefined?o.l:o;if(String(op.value)===String(val))op.selected=true;s.appendChild(op);});
  s.addEventListener('change',function(){setter(s.value);});return s;
}
function fld(lbl,inputEl){
  var d=el('div');d.className='fld';
  if(lbl){var lb=el('label');lb.className='lbl';lb.textContent=lbl;d.appendChild(lb);}
  d.appendChild(inputEl);return d;
}
function btn(txt,cls,fn){var b=el('button');b.className='btn '+cls;b.textContent=txt;if(fn)b.addEventListener('click',fn);return b;}
function g2(items){var g=el('div');g.className='g2';items.forEach(function(i){g.appendChild(i);});return g;}

// ── NAVIGATION ──────────────────────────────────────────────
function go(page,skipFetch){
  APP.page=page;
  document.querySelectorAll('.ni').forEach(function(b){b.classList.toggle('on',b.dataset.p===page||(page==='form'&&b.dataset.p==='list'));});
  var c=document.getElementById('content');c.innerHTML='';c.scrollTop=0;
  var nav=document.getElementById('nav'),fb=document.getElementById('formBar');
  // One-hand UX: while editing a booking, swap the bottom tab bar for a sticky
  // Cancel/Save action bar so the primary action is always one thumb-tap away —
  // no scrolling to the bottom of a long form required.
  if(page==='form'){ nav.style.display='none'; fb.style.display='flex'; c.classList.add('form-open'); }
  else { nav.style.display='grid'; fb.style.display='none'; c.classList.remove('form-open'); }
  // Perf fix (1): right after a save, APP.bookings is already up to date locally —
  // re-fetching from the server here just adds a slow network round-trip before the
  // list re-appears. skipFetch=true renders instantly from local memory instead, and
  // a background sync (already triggered by saveBooking) reconciles with the server.
  if(page==='dash'){ if(skipFetch){c.innerHTML='';c.appendChild(bDash());} else{ showLoading(c); loadBookings().then(function(){c.innerHTML='';c.appendChild(bDash());}); } }
  else if(page==='list'){ if(skipFetch){c.innerHTML='';c.appendChild(bList());} else{ showLoading(c); loadBookings().then(function(){c.innerHTML='';c.appendChild(bList());}); } }
  else if(page==='form') c.appendChild(bForm());
  else if(page==='hotels'){ showLoading(c); loadHotels().then(function(){c.innerHTML='';c.appendChild(bHotels());}); }
  else if(page==='sync') c.appendChild(bSyncPage());
}
// Loading spinner shown while a page waits on a network/storage call — replaces the
// old bare "Loading..." text so waits feel responsive instead of frozen.
function showLoading(container){
  container.innerHTML='';
  var d=el('div');d.className='loadwrap';d.innerHTML='<div class="spinner"></div><div>Loading...</div>';
  container.appendChild(d);
}

function openPrint(html,filename){
  filename=filename||'Mishri_Document';
  var baseName=filename.replace('.pdf','').replace('.html','');

  // Create preview overlay
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:#000d;z-index:9999;display:flex;flex-direction:column';

  // Top bar
  var topBar=document.createElement('div');
  topBar.style.cssText='background:#1A1D27;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid #2A2D3A';

  // Close function
  function closeOverlay(){ document.body.removeChild(overlay); }

  // Back button (big, left side)
  var backBtn=document.createElement('button');
  backBtn.className='btn bm sm';
  backBtn.innerHTML='&#8592; Back';
  backBtn.style.cssText='border-radius:16px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#8A8090;border:1.5px solid #8A8090;flex-shrink:0';

  var titleEl=document.createElement('div');

  titleEl.textContent=baseName;

  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:6px;flex-shrink:0';

  // Download PDF button
  var dlBtn=document.createElement('button');
  dlBtn.style.cssText='border-radius:16px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;background:#D4A843;color:#1a1d27;border:1.5px solid #D4A843';
  dlBtn.textContent='⬇ Save';
  dlBtn.addEventListener('click',function(){
    var blob=new Blob([html],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=baseName+'.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},3000);
    toast('Downloaded! Open in browser → Save as PDF');
  });

  // Print button
  var prBtn=document.createElement('button');
  prBtn.style.cssText='border-radius:16px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#D4A843;border:1.5px solid #D4A843';
  prBtn.textContent='🖨';
  prBtn.addEventListener('click',function(){
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
  });

  btnRow.appendChild(dlBtn);
  btnRow.appendChild(prBtn);
  topBar.appendChild(backBtn);
  topBar.appendChild(titleEl);
  topBar.appendChild(btnRow);
  overlay.appendChild(topBar);

  // iframe preview
  var iframe=document.createElement('iframe');
  iframe.style.cssText='flex:1;border:none;background:#fff';
  overlay.appendChild(iframe);

  document.body.appendChild(overlay);

  // Write HTML into iframe
  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();
}

function makeMultiQuot(b, options){

    +'.info-value{background:#fff;font-size:10.5px;padding:7px 10px;border-bottom:1px solid #eee;font-weight:500;color:#1a1d27}'
    +'.section-title{background:#D4A843;color:#1a1d27;font-weight:700;font-size:10px;padding:6px 12px;margin:14px 0 8px;letter-spacing:1px;text-transform:uppercase;border-radius:2px}'
    +'table{width:100%;border-collapse:collapse}'

function makeVouch(b){
  var on=b.selectedOption||1,c=calcOpt(b,on);
  var hotels=(b['opt'+on]||[]).filter(function(h){return h.hotelName&&h.checkIn;});
  // Bug fix (2): a vehicle slot only counts as a real vehicle if it has a Type entered.
  // Previously any slot with just a Pick-Up/Drop value (even without a vehicle type)
  // was treated as a separate vehicle, causing a duplicate/blank row with repeated
  // Pick-Up & Drop info in the voucher.
  // Bug fix (2): previously a vehicle row needed a "Type" to appear, so a Cab Number
  // entered without a Type never showed up in the voucher at all. Now a row shows if
  // EITHER Type or Cab Number is filled in.
  var vehs=(b.vehicles||[]).filter(function(v){return v.type||v.vehicleNo;});
  var hr='',vr='',ir='';
  var missingConfirmNo=false;
  hotels.forEach(function(h){
    // Bug fix (1): show per-hotel Address and Contact Number as subtext
    var hotelSub=[];
    if(h.phone) hotelSub.push('\u260E '+h.phone);
    var hotelSubHtml=hotelSub.length?'<br><span style="font-size:8.5px;color:#666">'+hotelSub.join(' &bull; ')+'</span>':'';
    var placeHtml=h.place+(h.address?'<br><span style="font-size:8.5px;color:#666">'+h.address+'</span>':'');
    // Bug fix (5): show Check-in / Check-out TIME alongside the date
    var checkInHtml=fmtD(h.checkIn)+(h.checkInTime?'<br><span style="font-size:8.5px;color:#666">'+fmtT(h.checkInTime)+'</span>':'');
    var checkOutHtml=fmtD(h.checkOut)+(h.checkOutTime?'<br><span style="font-size:8.5px;color:#666">'+fmtT(h.checkOutTime)+'</span>':'');
    // Bug fix (3): Room Category now shown as its own column (was missing entirely).
    // Bug fix (5): Confirmation No. now shown as its own bold column instead of tiny
    // grey subtext, so it doesn't get missed — and it's flagged if left blank.
    if(!h.confirmNo) missingConfirmNo=true;
    var confHtml=h.confirmNo?('<b style="color:#1a7a3a">'+h.confirmNo+'</b>'):'';
    hr+='<tr><td><b>'+h.hotelName+'</b>'+hotelSubHtml+'</td><td>'+(h.roomCat||'\u2014')+'</td><td>'+placeHtml+'</td><td>'+checkInHtml+'</td><td>'+checkOutHtml+'</td><td>'+nts(h.checkIn,h.checkOut)+'</td><td>'+mealLabel(h.mealPlan)+'</td><td>'+confHtml+'</td></tr>';
  });
  // Bug fix (2): show the Vehicle / Cab Number alongside the vehicle type

// Feature (7): amount-in-words helper for the Payment Receipt (Indian numbering)
function numToWords(num){
  num=Math.round(num||0);
  if(num===0) return 'Zero';
  var neg=num<0; num=Math.abs(num);
  var ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  var tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function twoDigit(n){ if(n<20) return ones[n]; return (tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'')).trim(); }
  function threeDigit(n){ var s=''; if(n>=100){ s+=ones[Math.floor(n/100)]+' Hundred'; n=n%100; if(n) s+=' '; } if(n>0) s+=twoDigit(n); return s; }
  var crore=Math.floor(num/10000000); num%=10000000;
  var lakh=Math.floor(num/100000); num%=100000;
  var thousand=Math.floor(num/1000); num%=1000;
  var rest=num;
  var parts=[];
  if(crore) parts.push(threeDigit(crore)+' Crore');
  if(lakh) parts.push(threeDigit(lakh)+' Lakh');
  if(thousand) parts.push(threeDigit(thousand)+' Thousand');
  if(rest) parts.push(threeDigit(rest));
  return (neg?'Minus ':'')+parts.join(' ');
}

// Accepts flexible column headers (any case, any order) and maps
// them to the hotel record fields used throughout the app.
function normalizeHotelRow(row){
  var out={name:'',place:'',cat:'',ph:'',em:'',stars:3};
  Object.keys(row).forEach(function(key){
    var k=key.toLowerCase().trim();
    var v=String(row[key]||'').trim();
    if(!v)return;
    if(k.indexOf('name')>=0) out.name=v;
    else if(k.indexOf('place')>=0||k.indexOf('city')>=0||k.indexOf('location')>=0||k.indexOf('destination')>=0) out.place=v;
    else if(k.indexOf('cat')>=0||k.indexOf('type')>=0) out.cat=v;
    else if(k.indexOf('phone')>=0||k.indexOf('contact')>=0||k.indexOf('mobile')>=0||k==='ph') out.ph=v;
    else if(k.indexOf('mail')>=0) out.em=v;
    else if(k.indexOf('star')>=0||k.indexOf('rating')>=0) out.stars=parseInt(v)||3;
  });
  return out;
}

  var ws=XLSX.utils.json_to_sheet(sample);
  var wbk=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wbk,ws,'Hotels');
  XLSX.writeFile(wbk,'Hotel_Import_Template.xlsx');
}

function bHotels(){
  var wrap=el('div');
  wrap.appendChild(div('font-size:18px;font-weight:800;color:#D4A843;margin-bottom:14px','Hotel Directory'));

  // ── EXCEL/CSV BULK IMPORT ────────────────────────────────
  var impCard=el('div');impCard.className='card';impCard.style.cssText='margin-bottom:12px;border:1.5px solid #2ECC7144';
  impCard.appendChild(div('font-size:14px;font-weight:700;color:#2ECC71;margin-bottom:6px','📤 Import Hotels from Excel'));
  impCard.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:10px','Columns: Name, Place, Category, Contact, Email, Stars (any order, any case — extra columns ignored)'));
  var impRow=el('div');impRow.style.cssText='display:flex;gap:8px;flex-wrap:wrap;align-items:center';
  var fileInp=document.createElement('input');
  fileInp.type='file';fileInp.accept='.xlsx,.xls,.csv';fileInp.style.display='none';
  var pickBtn=btn('📁 Choose Excel/CSV File','btn sm bn',function(){fileInp.click();});
  var sampleBtn=btn('⬇ Sample Template','btn sm bm',downloadHotelTemplate);
  impRow.appendChild(pickBtn);impRow.appendChild(sampleBtn);
  impCard.appendChild(impRow);
  impCard.appendChild(fileInp);
  var impStatus=el('div');impStatus.style.cssText='font-size:11px;margin-top:8px';
  impCard.appendChild(impStatus);
  var previewWrap=el('div');previewWrap.style.marginTop='10px';
  impCard.appendChild(previewWrap);
  fileInp.onchange=function(){
    var file=fileInp.files[0];if(!file)return;
    impStatus.style.color='#8A8090';impStatus.textContent='Reading file...';
    previewWrap.innerHTML='';
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'binary'});
        var sheet=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(sheet,{defval:''});
        if(!rows.length){impStatus.style.color='#E74C3C';impStatus.textContent='No rows found in this file.';return;}
        var parsed=rows.map(normalizeHotelRow).filter(function(h){return h.name;});
        if(!parsed.length){impStatus.style.color='#E74C3C';impStatus.textContent='Could not find a "Name" column — check the sample template.';return;}
        impStatus.style.color='#2ECC71';impStatus.textContent='✅ Found '+parsed.length+' hotel(s) — preview below, then confirm.';
        renderPreview(parsed);
      }catch(err){
        impStatus.style.color='#E74C3C';impStatus.textContent='Could not read file: '+err.message;
      }
    };
    reader.readAsBinaryString(file);
  };
  function renderPreview(parsed){
    previewWrap.innerHTML='';
    var list=el('div');list.style.cssText='max-height:220px;overflow-y:auto;border:1px solid #2A2D3A;border-radius:8px;padding:8px;margin-bottom:8px';
    parsed.forEach(function(h){
      var row=el('div');row.style.cssText='font-size:11px;padding:4px 0;border-bottom:1px solid #2A2D3A22';
      row.innerHTML='<b>'+h.name+'</b> — '+(h.place||'—')+' • 📞 '+(h.ph||'—')+' • ✉️ '+(h.em||'—');
      list.appendChild(row);
    });
    previewWrap.appendChild(list);
    var confirmBtn=btn('✅ Import '+parsed.length+' Hotels','btn bg sm',function(){
      // Merge: same Name+Place already in directory → update it; else add new
      var merged=APP.hotels.slice();
      parsed.forEach(function(h){
        var idx=merged.findIndex(function(x){return x.name.toLowerCase()===h.name.toLowerCase() && (x.place||'').toLowerCase()===(h.place||'').toLowerCase();});
        var record={id:idx>=0?merged[idx].id:Date.now()+Math.random(),name:h.name,place:h.place,cat:h.cat||'Standard',ph:h.ph,em:h.em,stars:h.stars||3};
        if(idx>=0) merged[idx]=record; else merged.push(record);
      });
      saveHotels(merged);
      toast('✅ Imported '+parsed.length+' hotels!');
      go('hotels');
    });
    previewWrap.appendChild(confirmBtn);
  }
  wrap.appendChild(impCard);

  // Search box
  var searchSt={q:''};
  var searchWrap=el('div');searchWrap.style.marginBottom='10px';
  var searchInp=inp('','','text','🔍 Search by name or place...');
  searchInp.oninput=function(e){searchSt.q=e.target.value.toLowerCase();renderList();};
  searchWrap.appendChild(searchInp);
  wrap.appendChild(searchWrap);

  var addWrap=el('div');var addSt={show:false,name:'',place:'',cat:'',ph:'',em:'',stars:3};
  function renderAdd(){
    addWrap.innerHTML='';
    if(!addSt.show){addWrap.appendChild(btn('+ Add Hotel','btn sm og',function(){addSt.show=true;renderAdd();}));return;}
    var form=el('div');form.className='card';form.style.marginBottom='12px';
    form.appendChild(div('font-size:13px;font-weight:700;color:#D4A843;margin-bottom:10px','Add New Hotel'));
    form.appendChild(fld('Hotel Name',inp(addSt.name,function(v){addSt.name=v;})));
    form.appendChild(fld('Place / City',inp(addSt.place,function(v){addSt.place=v;})));
    form.appendChild(fld('Category',inp(addSt.cat,function(v){addSt.cat=v;},'text','Budget/Standard/Premium/Luxury')));
    form.appendChild(fld('Contact No.',inp(addSt.ph,function(v){addSt.ph=v;})));
    form.appendChild(fld('Email',inp(addSt.em,function(v){addSt.em=v;},'email')));
    form.appendChild(fld('Stars (1-5)',inp(addSt.stars,function(v){addSt.stars=parseInt(v)||3;},'number')));
    var br=el('div');br.style.cssText='display:flex;gap:8px;margin-top:8px';
    br.appendChild(btn('Save','btn bg sm',function(){saveHotels(APP.hotels.concat([{id:Date.now(),name:addSt.name,place:addSt.place,cat:addSt.cat,ph:addSt.ph,em:addSt.em,stars:addSt.stars}]));go('hotels');}));
    br.appendChild(btn('Cancel','btn bm sm',function(){addSt.show=false;renderAdd();}));
    form.appendChild(br);addWrap.appendChild(form);
  }
  renderAdd();wrap.appendChild(addWrap);

  var listWrap=el('div');wrap.appendChild(listWrap);
  var editingId=null; // which hotel card is currently in edit mode

  function renderList(){
    listWrap.innerHTML='';
    var filtered=APP.hotels.filter(function(h){
      if(!searchSt.q)return true;
      return (h.name||'').toLowerCase().indexOf(searchSt.q)>=0 || (h.place||'').toLowerCase().indexOf(searchSt.q)>=0;
    });
    if(filtered.length===0){
      listWrap.appendChild(div('font-size:12px;color:#8A8090;text-align:center;padding:20px','No hotels match your search.'));
      return;
    }
    filtered.forEach(function(h){
      var cc=h.cat==='Luxury'?'#9B59B6':h.cat==='Premium'?'#E67E22':h.cat==='Heritage'?'#D4A843':'#3498DB';
      var card=el('div');card.className='card';card.style.marginBottom='8px';

      if(editingId===h.id){
        // ── EDIT MODE ──
        var eSt={name:h.name,place:h.place,cat:h.cat,ph:h.ph,em:h.em,stars:h.stars||3};
        card.appendChild(div('font-size:13px;font-weight:700;color:#D4A843;margin-bottom:8px','Edit Hotel'));
        card.appendChild(fld('Hotel Name',inp(eSt.name,function(v){eSt.name=v;})));
        card.appendChild(fld('Place / City',inp(eSt.place,function(v){eSt.place=v;})));
        card.appendChild(fld('Category',inp(eSt.cat,function(v){eSt.cat=v;})));
        card.appendChild(fld('Contact No.',inp(eSt.ph,function(v){eSt.ph=v;})));
        card.appendChild(fld('Email',inp(eSt.em,function(v){eSt.em=v;},'email')));
        card.appendChild(fld('Stars (1-5)',inp(eSt.stars,function(v){eSt.stars=parseInt(v)||3;},'number')));
        var ebr=el('div');ebr.style.cssText='display:flex;gap:8px;margin-top:8px';
        ebr.appendChild(btn('Save Changes','btn bg sm',function(){
          var updated=APP.hotels.map(function(x){
            return x.id===h.id?{id:h.id,name:eSt.name,place:eSt.place,cat:eSt.cat,ph:eSt.ph,em:eSt.em,stars:eSt.stars}:x;
          });
          editingId=null;saveHotels(updated);go('hotels');
        }));
        ebr.appendChild(btn('Cancel','btn bm sm',function(){editingId=null;renderList();}));
        card.appendChild(ebr);
      } else {
        // ── VIEW MODE ──
        card.innerHTML='<div style="font-weight:700;font-size:14px">'+h.name+'</div><div style="font-size:11px;color:#8A8090;margin-top:4px">📍 '+h.place+'  '+'★'.repeat(h.stars||3)+'</div><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"><span class="badge" style="background:'+cc+'22;color:'+cc+'">'+h.cat+'</span><span style="font-size:11px">📞 '+(h.ph||'—')+'</span></div><div style="font-size:11px;color:#3498DB;margin-top:4px">✉️ '+(h.em||'—')+'</div>';
        var btnRow=el('div');btnRow.style.cssText='display:flex;gap:8px;margin-top:8px';
        btnRow.appendChild(btn('✏️ Edit','btn sm bn',function(){editingId=h.id;renderList();}));
        btnRow.appendChild(btn('Remove','btn sm or',function(){saveHotels(APP.hotels.filter(function(x){return x.id!==h.id;}));go('hotels');}));
        card.appendChild(btnRow);
      }
      listWrap.appendChild(card);
    });
  }
  renderList();
  return wrap;
}

function bSyncPage(){
  var wrap=el('div');
  wrap.appendChild(div('font-size:18px;font-weight:800;color:#D4A843;margin-bottom:6px','📡 Sync & Storage'));

  // Status card
  var sc=el('div');sc.className='card';sc.style.cssText='border:1.5px solid '+(APP.online?'#2ECC71':'#E67E22')+'44;margin-bottom:14px';
  sc.innerHTML='<div style="font-size:14px;font-weight:700;color:'+(APP.online?'#2ECC71':'#E67E22')+';margin-bottom:6px">'+(APP.online?'🟢 Desktop Server Connected':'🟡 Offline Mode')+'</div>'
    +'<div style="font-size:12px;color:#8A8090;line-height:1.6">'
    +(APP.online
      ?'Data saves to <b style="color:#D4A843">data/bookings.json</b> on Desktop.<br>Mobile changes sync automatically when connected.'
      :'No server found. Data saves to <b style="color:#D4A843">mobile browser storage</b>.<br>Connect to Desktop WiFi to sync.')
    +'</div>';
  wrap.appendChild(sc);

  if(APP.online){
    var syncCard=el('div');syncCard.className='card';syncCard.style.marginBottom='12px';
    syncCard.appendChild(div('font-size:14px;font-weight:700;color:#2ECC71;margin-bottom:8px','⟳ WiFi Sync'));
    syncCard.appendChild(div('font-size:12px;color:#8A8090;margin-bottom:10px','Mobile local data will be merged with Desktop data/bookings.json. Newer record wins.'));
    syncCard.appendChild(btn('Sync Now','btn gn',doSync));
    if(APP.serverIp){
      syncCard.appendChild(div('font-size:11px;color:#8A8090;margin-top:8px','Connected to: http://'+APP.serverIp+':7842'));
    }
    wrap.appendChild(syncCard);
    // Import button for online mode (to import from offline file)
    var impCard=el('div');impCard.className='card';impCard.style.cssText='margin-bottom:12px;border:1.5px solid #3498DB44';
    impCard.appendChild(div('font-size:14px;font-weight:700;color:#3498DB;margin-bottom:4px','📥 Offline Data Import'));
    impCard.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:10px','Mobile offline file (content://) માંથી Export કરેલો data અહીં paste કરો — Desktop સાથે merge થઈ જશે'));
    impCard.appendChild(btn('📥 Import & Merge','btn bn',doImport));
    wrap.appendChild(impCard);
  } else {
    // Manual IP connect card
    var ipCard=el('div');ipCard.className='card';ipCard.style.cssText='margin-bottom:12px;border:1.5px solid #D4A84344';
    ipCard.appendChild(div('font-size:14px;font-weight:700;color:#D4A843;margin-bottom:6px','🖥️ Desktop Server Connect કરો'));
    ipCard.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:10px','Automatic ન થાય તો Desktop ની IP manually enter કરો — CMD → ipconfig → IPv4 Address'));
    var scanBtn=btn('🔍 Auto-Find Desktop (Scan WiFi)','btn sm bn',function(){
      scanBtn.textContent='🔍 Scanning...';scanBtn.disabled=true;
      scanNetwork(true).then(function(found){
        scanBtn.textContent='🔍 Auto-Find Desktop (Scan WiFi)';scanBtn.disabled=false;
        if(found){doSync();go('sync');}
      });
    });
    scanBtn.style.marginBottom='10px';
    ipCard.appendChild(scanBtn);
    var ipRow=el('div');ipRow.style.cssText='display:flex;gap:8px;align-items:center';
    var ipInp=el('input');ipInp.className='inp';ipInp.placeholder='192.168.29.61';
    ipInp.value=SAVED_IP||'192.168.29.61';
    ipInp.style.flex='1';
    var conBtn=btn('🔗 Connect','btn bg',function(){
      var ip=ipInp.value.trim();
      if(!ip){toast('IP enter કરો',false);return;}
      SAVED_IP=ip;LS.s('serverIp',ip);
      APP.serverIp=ip;
      toast('Connecting...');
      checkServer().then(function(ok){
        if(ok){toast('✅ Desktop connected!');doSync();go('sync');}
        else{toast('❌ Connect ન થઈ — Desktop server ચાલુ છે?',false);}
      });
    });
    ipRow.appendChild(ipInp);ipRow.appendChild(conBtn);
    ipCard.appendChild(ipRow);
    wrap.appendChild(ipCard);

    // WiFi instructions
    var wCard=el('div');wCard.className='card';wCard.style.marginBottom='12px';
    wCard.appendChild(div('font-size:14px;font-weight:700;color:#D4A843;margin-bottom:10px','📋 Steps:'));
    ['1. Desktop પર START_MISHRI_CRM.bat ચાલુ કરો','2. Desktop CMD માં ipconfig → IPv4 Address note કરો','3. ઉપર IP enter કરી Connect tap કરો','4. WiFi પર auto-sync, Mobile Data પર offline mode'].forEach(function(t){var d=el('div');d.style.cssText='font-size:12px;color:#E8E0D0;padding:7px 0;border-bottom:1px solid #2A2D3A44;line-height:1.5';d.textContent=t;wCard.appendChild(d);});
    wrap.appendChild(wCard);
  }

  // ── MANUAL EXPORT/IMPORT ──────────────────────────────────
  var xCard=el('div');xCard.className='card';xCard.style.cssText='margin-bottom:12px;border:1.5px solid #D4A84344';
  xCard.appendChild(div('font-size:14px;font-weight:700;color:#D4A843;margin-bottom:4px','📤 Manual Transfer'));
  xCard.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:12px','WiFi ન હોય ત્યારે — Mobile Data પર data transfer કરો'));
  var expSec=el('div');expSec.style.cssText='background:#0F1117;border-radius:8px;padding:10px;margin-bottom:8px';
  expSec.appendChild(div('font-size:12px;font-weight:700;color:#2ECC71;margin-bottom:4px','📱 → 🖥️  Mobile થી Desktop'));
  expSec.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:8px','Mobile offline file માં data છે? Export કરો → Desktop માં Import કરો'));
  expSec.appendChild(btn('📤 Export (Mobile Data Copy કરો)','btn gn',doExport));
  xCard.appendChild(expSec);
  var impSec=el('div');impSec.style.cssText='background:#0F1117;border-radius:8px;padding:10px';
  impSec.appendChild(div('font-size:12px;font-weight:700;color:#3498DB;margin-bottom:4px','🖥️ → 📱  Desktop થી Mobile'));
  impSec.appendChild(div('font-size:11px;color:#8A8090;margin-bottom:8px','Desktop નો data Mobile માં લાવવો છે? Desktop Export → અહીં Import'));
  impSec.appendChild(btn('📥 Import (Desktop Data Paste કરો)','btn bn',doImport));
  xCard.appendChild(impSec);
  wrap.appendChild(xCard);

  // How data works
  var hCard=el('div');hCard.className='card';
  hCard.appendChild(div('font-size:14px;font-weight:700;color:#D4A843;margin-bottom:10px','💾 Data Storage'));
  hCard.innerHTML+=''
    +'<div style="background:#0F1117;border-radius:8px;overflow:hidden">'
    +'<div style="padding:10px 12px;border-bottom:1px solid #2A2D3A"><div style="font-size:12px;font-weight:700;color:#E8E0D0;margin-bottom:3px">🖥️ Desktop (Server ON)</div><div style="font-size:11px;color:#8A8090">data/bookings.json — permanent file</div><div style="font-size:11px;color:#2ECC71">✅ Never lost, editable in Notepad</div></div>'
    +'<div style="padding:10px 12px;border-bottom:1px solid #2A2D3A"><div style="font-size:12px;font-weight:700;color:#E8E0D0;margin-bottom:3px">📱 Mobile (Offline)</div><div style="font-size:11px;color:#8A8090">Browser localStorage — works without server</div><div style="font-size:11px;color:#E67E22">⚠ Clear browser = data lost (sync first!)</div></div>'
    +'<div style="padding:10px 12px"><div style="font-size:12px;font-weight:700;color:#E8E0D0;margin-bottom:3px">🔄 When WiFi connects</div><div style="font-size:11px;color:#8A8090">Auto-merge — newer record wins — both synced</div><div style="font-size:11px;color:#2ECC71">✅ No data lost from either device</div></div>'
    +'</div>';
  wrap.appendChild(hCard);
  return wrap;
}

// ── LOGIN SCREEN (cloud mode only) ────────────────────────────
function showLoginScreen(msg){
  var old=document.getElementById('loginScreen');if(old)old.remove();
  var wrap=document.createElement('div');
  wrap.id='loginScreen';
  wrap.style.cssText='position:fixed;inset:0;background:#0F1117;z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px';
  wrap.innerHTML=''
    +'<div style="width:100%;max-width:340px;text-align:center">'
    +'<div style="font-size:40px;margin-bottom:6px">✈️</div>'
    +'<div style="font-family:Georgia,serif;font-style:italic;font-size:22px;font-weight:900;color:#D4A843;margin-bottom:4px">Mishri Holidays</div>'
    +'<div style="font-size:12px;color:#8A8090;margin-bottom:22px">Enter password to continue</div>'
    +(msg?'<div style="color:#E74C3C;font-size:12px;margin-bottom:12px">'+msg+'</div>':'')
    +'<input type="password" id="loginPass" placeholder="Password" style="width:100%;padding:12px 14px;border-radius:8px;border:1.5px solid #2A2D3A;background:#1A1D27;color:#E8E0D0;font-size:14px;margin-bottom:12px;box-sizing:border-box">'
    +'<button id="loginBtn" style="width:100%;padding:12px;border-radius:8px;border:none;background:#D4A843;color:#1a1d27;font-weight:700;font-size:14px;cursor:pointer">Unlock</button>'
    +'</div>';
  document.body.appendChild(wrap);
  var passInput=document.getElementById('loginPass');
  var goBtn=document.getElementById('loginBtn');
  function attempt(){
    var pw=passInput.value;
    if(!pw)return;
    goBtn.textContent='Checking...';goBtn.disabled=true;
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})})
      .then(function(r){return r.json();})
      .then(function(res){
        if(res.ok&&res.token){
          APP.authToken=res.token;LS.s('authToken',res.token);
          wrap.remove();
          init();
        } else {
          goBtn.textContent='Unlock';goBtn.disabled=false;
          showLoginScreen(res.error||'Wrong password');
        }
      }).catch(function(){
        goBtn.textContent='Unlock';goBtn.disabled=false;
        showLoginScreen('Network error — check internet connection');
      });
  }
  goBtn.onclick=attempt;
  passInput.onkeydown=function(e){if(e.key==='Enter')attempt();};
  passInput.focus();
}

// ── BOOT: password gate active for hosted/cloud mode (data safety) ──
function boot(){
  if(REQUIRES_LOGIN && !APP.authToken){
    showLoginScreen();
  } else {
    init();
  }
}


// ── BOOT ────────────────────────────────────────────────
boot();
