<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mishri CRM">
<meta name="theme-color" content="#0A0C12">
<title>✈ Mishri Holidays CRM</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
// Perf: lazy-load heavy third-party bundles (xlsx ~800KB, html2pdf ~600KB) only when
// actually needed, instead of blocking initial parse/download on every page load.
// Cached so repeat calls in the same session reuse the already-loaded script.
var _scriptCache={};
function loadScriptOnce(src){
  if(_scriptCache[src]) return _scriptCache[src];
  _scriptCache[src]=new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src=src;
    s.onload=function(){resolve();};
    s.onerror=function(){delete _scriptCache[src];reject(new Error('Failed to load '+src));};
    document.head.appendChild(s);
  });
  return _scriptCache[src];
}
var XLSX_CDN='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
var HTML2PDF_CDN='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
</script>
<script>
// Register service worker (enables install prompt + offline app shell)
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){/* not fatal */});
  });
}

// Track install prompt
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredPrompt=e;
  setTimeout(function(){
    var btn=document.getElementById('installBtn');
    if(btn)btn.style.display='flex';
  },1000);
});
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:#0A0C12;
  background-image:
    radial-gradient(circle at 15% 0%, rgba(212,168,67,0.10) 0%, transparent 45%),
    radial-gradient(circle at 100% 20%, rgba(46,204,113,0.07) 0%, transparent 40%),
    linear-gradient(160deg,#0A0C12 0%,#12141f 55%,#0d0f18 100%);
  background-attachment:fixed;
  color:#E8E0D0;
  font-family:'Poppins',-apple-system,'Segoe UI',Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
input,select,button{font-family:inherit}
::selection{background:#D4A84355}
#app{display:flex;flex-direction:column;height:100dvh}

/* ── Fade-in for freshly rendered pages (no JS needed — plays automatically on insert) ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#content>*{animation:fadeInUp .35s cubic-bezier(.2,.8,.2,1)}

/* ── Glass header ── */
#hdr{
  background:linear-gradient(180deg,rgba(26,29,39,0.92),rgba(20,22,31,0.85));
  backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
  border-bottom:1px solid rgba(212,168,67,0.16);
  padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-badge{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#F0C869,#B8892F);
  display:flex;align-items:center;justify-content:center;font-size:19px;
  box-shadow:0 4px 12px rgba(212,168,67,.35);
}
.brand-name{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:900;font-size:17px;letter-spacing:.2px;
  background:linear-gradient(135deg,#F3D68A,#D4A843 60%,#B8892F);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand-sub{font-size:10px;color:#8A8090;margin-top:1px;letter-spacing:.3px;font-weight:500}

#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 100px;scroll-behavior:smooth}
#content.form-open{padding-bottom:92px}

/* ── Glass bottom nav ── */
#nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,rgba(20,22,31,0.88),rgba(15,17,23,0.96));
  backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
  border-top:1px solid rgba(212,168,67,0.14);
  display:grid;grid-template-columns:repeat(6,1fr);
  padding-bottom:env(safe-area-inset-bottom);height:calc(64px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 24px rgba(0,0,0,.3);
}
.ni{display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#7d7a86;font-size:10.5px;font-weight:600;gap:4px;border:none;background:none;width:100%;min-height:56px;position:relative;transition:color .2s ease}
.ni:active{transform:scale(0.92)}
.ni.on{color:#F0C869}
.ni.on::before{content:'';position:absolute;top:3px;left:50%;transform:translateX(-50%);width:22px;height:3px;border-radius:3px;background:linear-gradient(90deg,#F0C869,#D4A843);box-shadow:0 0 8px rgba(212,168,67,.6)}
.ni .ic{font-size:21px;line-height:1;transition:transform .2s ease}
.ni.on .ic{transform:translateY(-1px) scale(1.08)}

/* ── Sticky Save/Cancel bar ── */
#formBar{position:fixed;left:0;right:0;bottom:0;z-index:110;
  background:linear-gradient(180deg,rgba(20,22,31,0.92),rgba(15,17,23,0.98));
  backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
  border-top:1px solid rgba(212,168,67,0.16);
  display:none;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -8px 24px rgba(0,0,0,.4)}
#formBar .btn{flex:1;min-height:48px;font-size:14.5px}
@media(min-width:768px){#content{max-width:960px;margin:0 auto;padding:22px 24px 40px}#formBar>div{max-width:960px;margin:0 auto;width:100%;display:flex;gap:10px}}

/* ── Mobile-only Floating Action Bar — shown only while a booking is open
   (page==='form'), stacked above #formBar (Cancel/Save), itself above #nav.
   Desktop (>768px) never shows this bar — see the media query at the bottom
   of this block, which is the only thing gating visibility on top of the
   .show class toggled from go(). ── */
#fabBar{position:fixed;left:0;right:0;z-index:115;display:none;
  grid-template-columns:repeat(6,1fr);gap:2px;padding:6px 4px;
  background:linear-gradient(180deg,rgba(20,22,31,0.95),rgba(15,17,23,0.99));
  backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
  border-top:1px solid rgba(212,168,67,0.16);box-shadow:0 -6px 18px rgba(0,0,0,.35)}
#fabBar button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:none;border:none;color:#E8E0D0;font-size:8.8px;font-weight:600;line-height:1.1;
  cursor:pointer;min-height:46px;border-radius:8px;padding:2px 0;transition:background .15s ease}
#fabBar button:active{background:rgba(212,168,67,0.18)}
#fabBar button .ic{font-size:17px;line-height:1}
@media(max-width:768px){
  #fabBar.show{display:grid}
  #content.fab-open{padding-bottom:150px}
}

/* ── Mobile-only Sticky Cost Summary — sits between #hdr and #content (a
   flex-column sibling, not part of the scrolling area) so it stays visible
   at all times while the Booking Form's content scrolls beneath it. Shown
   only while a booking is open (page==='form'), toggled from go() exactly
   like #formBar/#fabBar. Values are written by updateStickyCostBar(), which
   performs no calculation of its own — it only formats numbers already
   computed by the existing calcOpt()/refreshSummary() logic. ── */
#stickyCostBar{display:none;flex-shrink:0;grid-template-columns:repeat(4,1fr);gap:1px;
  background:linear-gradient(180deg,rgba(26,29,39,0.94),rgba(20,22,31,0.9));
  backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
  border-bottom:1px solid rgba(212,168,67,0.16);box-shadow:0 4px 14px rgba(0,0,0,.22);
  z-index:45;cursor:pointer}
#stickyCostBar>div{padding:7px 4px;text-align:center}
#stickyCostBar .scb-lbl{font-size:8px;color:#8A8090;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
#stickyCostBar .scb-val{font-size:12px;font-weight:800;color:#E8E0D0}
#stickyCostBar #scbProfit,#stickyCostBar #scbProfitPct{color:#2ECC71}
@media(max-width:768px){#stickyCostBar.show{display:grid}}

/* ── Mobile-only Sticky Option Switching Toolbar — sits directly below
   #stickyCostBar (same fixed-chrome flex column, not part of the scrolling
   area), shown only while the Booking Form's Hotels tab is open (where
   Option 1/2/3 costing lives). Tapping a button calls the SAME existing
   switchOpt(n) closure from buildTab('hotels') via APP._switchOptFn — no
   new option-switching logic is introduced here, this is a display-only
   alias/shortcut to it. ── */
#optSwitchBar{display:none;flex-shrink:0;align-items:stretch;justify-content:center;gap:6px;padding:6px 10px;
  background:linear-gradient(180deg,rgba(20,22,31,0.94),rgba(15,17,23,0.9));
  backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);
  border-bottom:1px solid rgba(212,168,67,0.12);z-index:44}
/* Each option gets its own button + "current Selling Price" readout stacked
   underneath it, so all 3 options can be compared at a glance without tapping. */
#optSwitchBar .osb-item{flex:1;max-width:130px;display:flex;flex-direction:column;align-items:center;gap:2px}
#optSwitchBar button{width:100%;background:none;border:none;color:#8A8090;font-size:11.5px;font-weight:700;
  padding:4px 8px;border-radius:6px;cursor:pointer;transition:all .15s ease}
#optSwitchBar .osb-price{font-size:9.5px;font-weight:700;color:#6E6B78;transition:color .15s ease}
#optSwitchBar .osb-item.active .osb-price{color:#D4A843}
#optSwitchBar button.opt1.active{color:#1a1d27;background:#2ECC71}
#optSwitchBar button.opt2.active{color:#fff;background:#3498DB}
#optSwitchBar button.opt3.active{color:#fff;background:#E67E22}
@media(max-width:768px){#optSwitchBar.show{display:flex}}

/* ── Mobile-only Smart Colour Coding for Cost Summary displays ──
   These classes only take effect under the same 768px breakpoint every other
   mobile-only block on this page already uses, and only override the *color*
   of a value that calcOpt()/refreshSummary() already computed and printed —
   no figure is recalculated here. Desktop keeps the original inline colors
   untouched because the media query below simply never applies there. */
@media(max-width:768px){
  .cs-cost{color:#8A8B93 !important}
  .cs-profit-pos{color:#2ECC71 !important}
  .cs-profit-neg{color:#E74C3C !important}
  .cs-profit-zero{color:#8A8B93 !important}
}

/* ── Mobile-only Global Smart Search ──
   #globalSearchBtn sits in the header (#hdr), which is part of the static
   app shell and therefore visible on every page — that's what makes the
   search "accessible from anywhere". Hidden by default; only shown under
   the same 768px breakpoint every other mobile-only control on this page
   uses, so desktop is completely unaffected. #globalSearchOverlay is the
   full-screen results panel it opens — also hard-gated to mobile via a
   min-width override, as defense in depth. ── */
#globalSearchBtn{display:none}
@media(max-width:768px){#globalSearchBtn{display:inline-flex;padding:9px 11px}}
#globalSearchOverlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(10,11,16,0.98);flex-direction:column}
#globalSearchOverlay.show{display:flex}
@media(min-width:769px){#globalSearchOverlay{display:none !important}}
#globalSearchOverlay .gs-head{display:flex;align-items:center;gap:8px;padding:14px 14px 10px;flex-shrink:0}
#globalSearchOverlay .gs-head .inp{flex:1}
#globalSearchOverlay .gs-close{background:none;border:none;color:#8A8090;font-size:22px;line-height:1;cursor:pointer;padding:4px 10px}
#globalSearchResults{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 14px 24px}
.gs-hint{color:#8A8090;font-size:12.5px;text-align:center;padding:44px 20px;line-height:1.6}
.gs-mark{background:rgba(212,168,67,0.35);color:#F0C869;border-radius:3px;padding:0 2px}

/* ── Glass-look cards (no backdrop-filter — see perf note below) ── */
.card{
  background:linear-gradient(160deg,rgba(38,41,56,0.88),rgba(24,26,37,0.92));
  border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;padding:14px;margin-bottom:11px;
  box-shadow:0 6px 20px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.04);
  transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
}
@media(hover:hover){.card:hover{transform:translateY(-2px);border-color:rgba(212,168,67,.28);box-shadow:0 10px 28px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05)}}

/* Icon badge used in dashboard stat cards / list items — colored rounded chip */
.icon-badge{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* ── Forms ── */
.inp{width:100%;background:rgba(10,12,18,0.55);border:1.5px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px 13px;color:#E8E0D0;font-size:15px;outline:none;min-height:46px;transition:border-color .15s ease,box-shadow .15s ease}
.inp:focus{border-color:#D4A843;box-shadow:0 0 0 3px #D4A84322}
.sel{width:100%;background:rgba(26,29,39,0.75);border:1.5px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px 13px;color:#E8E0D0;font-size:15px;outline:none;min-height:46px}
.sel:focus{border-color:#D4A843;box-shadow:0 0 0 3px #D4A84322}
.lbl{font-size:11.5px;color:#9b96a3;margin-bottom:5px;display:block;font-weight:600;letter-spacing:.2px}
.fld{margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Buttons — gradient fills, tactile press, subtle glow on primary ── */
.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid transparent;white-space:nowrap;min-height:46px;transition:transform .1s ease,opacity .15s ease,box-shadow .2s ease;letter-spacing:.1px}
.btn:active{transform:scale(0.96);opacity:0.92}
.sm{border-radius:18px;padding:8px 14px;font-size:12.5px;min-height:38px}
.bg{background:linear-gradient(135deg,#F0C869,#D4A843 55%,#B8892F);color:#1a1200;border-color:transparent;box-shadow:0 4px 14px rgba(212,168,67,.3)}
.og{background:rgba(212,168,67,0.08);color:#F0C869;border-color:rgba(212,168,67,0.55)}
.ob{background:rgba(52,152,219,0.08);color:#5DADE2;border-color:rgba(52,152,219,0.55)}
.or{background:rgba(231,76,60,0.08);color:#EC7063;border-color:rgba(231,76,60,0.55)}
.bm{background:transparent;color:#9b96a3;border-color:rgba(255,255,255,0.16)}
.gn{background:linear-gradient(135deg,#58D68D,#2ECC71);color:#0c2417;border-color:transparent;box-shadow:0 4px 14px rgba(46,204,113,.28)}
.bn{background:linear-gradient(135deg,#5DADE2,#3498DB);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(52,152,219,.28)}
.pp{background:linear-gradient(135deg,#BB79D6,#9B59B6);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(155,89,182,.28)}
.o2{background:linear-gradient(135deg,#EB984E,#E67E22);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(230,126,34,.28)}

/* ── Sticky glass tab bar ── */
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(180deg,rgba(18,20,28,0.9),rgba(14,16,22,0.85));
  backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);
  -webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:20}
.tb{padding:13px 15px;font-size:12.5px;font-weight:600;background:transparent;border:none;border-bottom:2.5px solid transparent;color:#7d7a86;cursor:pointer;white-space:nowrap;flex-shrink:0;min-height:44px;transition:color .2s ease,border-color .2s ease}
.tb.on{color:#F0C869;border-bottom-color:#D4A843}
.badge{font-size:10px;border-radius:8px;padding:2px 7px;font-weight:700;letter-spacing:.2px}
.sync-badge{font-size:10px;border-radius:10px;padding:3px 8px;font-weight:700;letter-spacing:.2px;white-space:nowrap;flex-shrink:0;transition:opacity .35s ease,background-color .35s ease,color .35s ease;opacity:1}
.row{display:flex;justify-content:space-between;align-items:center}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:18px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;pointer-events:none;backdrop-filter:blur(10px);box-shadow:0 6px 20px rgba(0,0,0,.35)}
.sect{font-size:11px;font-weight:700;color:#9b96a3;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.08)}
.hblock{border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02)}
.mkbtn{flex:1;padding:11px 4px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;border:1.5px solid;text-align:center;min-height:44px;transition:transform .1s ease}
.mkbtn:active{transform:scale(.96)}
.syncbadge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
table th,table td{vertical-align:middle}
table td .inp,table td .sel{min-width:60px}
details summary{outline:none;min-height:32px;display:flex;align-items:center}
details summary::-webkit-details-marker{color:#D4A843}

/* Headings — Playfair Display for a premium editorial travel-brand feel */
.h1,.h2{font-family:'Playfair Display',Georgia,serif}
.h1{font-size:21px;font-weight:900;font-style:italic;
  background:linear-gradient(135deg,#F3D68A,#D4A843 60%,#B8892F);-webkit-background-clip:text;background-clip:text;color:transparent}
.h2{font-size:15px;font-weight:700;color:#F0C869}

/* Prev/Next quick tab-nav row */
.tabnav{display:flex;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)}
.tabnav .btn{flex:1;min-height:46px}

/* Loading spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,0.1);border-top-color:#D4A843;border-radius:50%;animation:spin .7s linear infinite}
.spinner.sm{width:16px;height:16px;border-width:2px}
.loadwrap{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;color:#8A8090;font-size:12.5px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="brand">
      <div class="brand-badge">✈</div>
      <div>
        <div class="brand-name">Mishri Holidays</div>
        <div class="brand-sub" id="syncStatus">Loading...</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn sm" id="globalSearchBtn" title="Search bookings">🔍</button>
      <button class="btn sm og" id="syncBtn" style="display:none">⟳ Sync</button>
      <button class="btn sm" id="installBtn" style="display:none;background:linear-gradient(135deg,#BB79D6,#9B59B6);color:#fff;border-color:transparent" onclick="installApp()">📲 Install</button>
      <button class="btn bg sm" id="hdrNew">+ New</button>
    </div>
  </div>
  <div id="stickyCostBar">
    <div><div class="scb-lbl">Total Cost</div><div class="scb-val" id="scbCost">—</div></div>
    <div><div class="scb-lbl">Selling Price</div><div class="scb-val" id="scbSell">—</div></div>
    <div><div class="scb-lbl">Profit</div><div class="scb-val" id="scbProfit">—</div></div>
    <div><div class="scb-lbl">Profit %</div><div class="scb-val" id="scbProfitPct">—</div></div>
  </div>
  <div id="optSwitchBar">
    <div class="osb-item" id="osbItem1"><button id="optSwBtn1" class="opt1" data-n="1">Option 1</button><div class="osb-price" id="osbPrice1">—</div></div>
    <div class="osb-item" id="osbItem2"><button id="optSwBtn2" class="opt2" data-n="2">Option 2</button><div class="osb-price" id="osbPrice2">—</div></div>
    <div class="osb-item" id="osbItem3"><button id="optSwBtn3" class="opt3" data-n="3">Option 3</button><div class="osb-price" id="osbPrice3">—</div></div>
  </div>
  <div id="content"><div class="loadwrap"><div class="spinner"></div><div>Loading...</div></div></div>
  <div id="formBar"><div><button class="btn bm" id="formBarCancel">Cancel</button><button class="btn bg" id="formBarSave">💾 Save</button></div></div>
  <div id="fabBar">
    <button id="fabSave"><span class="ic">💾</span><span>Save</span></button>
    <button id="fabQuot"><span class="ic">📄</span><span>Quotation</span></button>
    <button id="fabVouch"><span class="ic">🎫</span><span>Voucher</span></button>
    <button id="fabAddOpt"><span class="ic">➕</span><span>Add Option</span></button>
    <button id="fabCall"><span class="ic">📞</span><span>Call</span></button>

<script>
"use strict";
// ════════════════════════════════════════════════════════════
//  MISHRI HOLIDAYS CRM
//  Storage:
//    Desktop  → data/bookings.json  (via server API)
//    Mobile   → localStorage        (offline)
//    WiFi on  → auto-sync + merge   (newer record wins)
// ════════════════════════════════════════════════════════════

var MEALS=['CP','MAP','AP','EP','AI'];

// Phase 1A/1B: Reasons shown only when Status = Lost
var LOST_REASONS=['Price','Date Issue','No Response','Booked Elsewhere','Cancelled Trip','Other'];
var DEF_HOTELS=[

  {id:6,name:'Wildflower Hall',place:'Shimla',cat:'Luxury',ph:'+91 177 264 8585',em:'wildflower@oberoihotels.com',stars:5},
  {id:7,name:'Ibis Styles',place:'Goa',cat:'Budget',ph:'+91 832 671 2345',em:'goa@ibishotels.com',stars:3},
  {id:8,name:'Alsisar Haveli',place:'Jaipur',cat:'Heritage',ph:'+91 141 236 8290',em:'info@alsisarhaveli.com',stars:4}
];

// ══════════════════════════════════════════════════════════════
//  STORAGE — IndexedDB (primary) + localStorage (fallback)
//  IndexedDB survives "Clear browsing history" on Android Chrome
// ══════════════════════════════════════════════════════════════
var IDB={db:null};
function idbOpen(){
  return new Promise(function(res){
    if(IDB.db){res(IDB.db);return;}
    if(!window.indexedDB){res(null);return;}
    var req=indexedDB.open('MishriCRM',2);
    req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');};
    req.onsuccess=function(e){IDB.db=e.target.result;res(IDB.db);};
    req.onerror=function(){res(null);};
  });
}
function idbSet(k,v){
  return idbOpen().then(function(db){
    if(!db)return;
    return new Promise(function(res){
      var tx=db.transaction('kv','readwrite');
      tx.objectStore('kv').put(JSON.stringify(v),'mc_'+k);
      tx.oncomplete=res;tx.onerror=res;
    });
  });
}
function idbGet(k){
  return idbOpen().then(function(db){
    if(!db)return null;
    return new Promise(function(res){
      var tx=db.transaction('kv','readonly');
      var req=tx.objectStore('kv').get('mc_'+k);
      req.onsuccess=function(){try{res(req.result?JSON.parse(req.result):null);}catch(e){res(null);}};
      req.onerror=function(){res(null);};
    });
  });
}
var LS={
  g:function(k){try{var d=localStorage.getItem('mc_'+k);if(d)return JSON.parse(d);}catch(e){}return null;},
  s:function(k,v){try{localStorage.setItem('mc_'+k,JSON.stringify(v));}catch(e){}idbSet(k,v).catch(function(){});}
};
function restoreFromIDB(){
  var keys=['bookings','hotels','serverIp'];
  return Promise.all(keys.map(function(k){
    return idbGet(k).then(function(val){
      if(val!==null){
        try{if(!localStorage.getItem('mc_'+k)){localStorage.setItem('mc_'+k,JSON.stringify(val));}}catch(e){}
      }
    });
  }));
}
function requestPersist(){
  if(navigator.storage&&navigator.storage.persist){
    navigator.storage.persist().then(function(g){if(g)console.log('MishriCRM: Persistent storage granted');});
  }
}

// ── APP STATE ───────────────────────────────────────────────
var APP={
  page:'dash',
  bookings:[],
  hotels:LS.g('hotels')||DEF_HOTELS,
  itinTemplates:LS.g('itinTemplates')||[],
  pkgTemplates:LS.g('pkgTemplates')||[],
  edit:null,
  ftab:'guest',
  online:false,      // is server reachable?
  useRelative:false, // true = cloud (Netlify) or same-origin desktop server
  serverIp:null,
  authToken:LS.g('authToken')||null,
  pendingSync:false, // local changes not yet synced
  templatesPendingSync:false, // Package/Itinerary template changes not yet synced
  hotelsPendingSync:false, // Hotel Master changes not yet synced (offline-safe Hotel Master sync)
  templatesSyncStatus:'synced' // UI-only: 'synced'|'pending'|'syncing'|'failed' — Sync Status badge (Package Master / Itinerary Templates screens). Purely a display flag; never read by any sync/merge logic.
};
var REQUIRES_LOGIN = false; // password gateway disabled

// ── TIMESTAMP ───────────────────────────────────────────────
function now(){return new Date().toISOString();}

// ── TOAST ───────────────────────────────────────────────────
function toast(msg,ok){
  document.querySelectorAll('.toast').forEach(function(t){t.remove();});
  var t=document.createElement('div');t.className='toast';
  t.style.background=(ok===false)?'#E74C3C':'#2ECC71';t.style.color='#fff';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},2800);
}

// ── STATUS BAR ──────────────────────────────────────────────
function updateStatusBar(){
  var el=document.getElementById('syncStatus');
  var sb=document.getElementById('syncBtn');
  if(!el)return;
  if(APP.online){
    el.style.color='#2ECC71';
    el.textContent=APP.useRelative?'● Online — synced to cloud':'● Desktop server connected — data/bookings.json';
    if(sb) sb.style.display='';
  } else {
    el.style.color='#E67E22';
    el.textContent='● Offline — data saved locally';
    if(sb) sb.style.display='none';
  }
}

// ── SERVER CHECK ────────────────────────────────────────────
// Tries: 1) saved IP, 2) relative URL (when hosted on desktop itself)
var SAVED_IP=LS.g('serverIp')||null;
var SERVER_CANDIDATES=[];

function buildCandidates(){
  var c=[];
  if(SAVED_IP) c.push('http://'+SAVED_IP+':7842');
  // If served from desktop directly, relative works
  if(window.location.hostname!=='localhost'&&window.location.port==='7842'){
    c.push(window.location.origin);
  }
  // Common home router subnets to scan
  var subnets=['192.168.29','192.168.1','192.168.0','10.0.0'];
  subnets.forEach(function(s){
    if(SAVED_IP&&SAVED_IP.startsWith(s)) return; // already added
    c.push('http://'+s+'.1:7842'); // try .1 as fallback
  });
  return c;
}

function tryUrl(url){
  return fetch(url+'/api/ip',{
    signal:AbortSignal.timeout?AbortSignal.timeout(1500):undefined,
    mode:'cors'
  }).then(function(r){return r.json();})
    .then(function(d){return {ok:true,ip:d.ip,base:url};});
}

function checkServer(){
  // 1) Try same-origin first — this covers BOTH:
  //    a) App deployed on Netlify (mobile & desktop both hit the same cloud URL)
  //    b) App served by the desktop LAN server itself (port 7842)
  return tryUrl(window.location.origin).then(function(res){
    res.relative=true;return res;
  }).catch(function(){
    // 2) Fall back to LAN discovery (saved IP / subnet guesses) —
    //    only relevant when the app was opened as a local file on mobile
    //    and is pairing with a desktop server on the same WiFi.
    var candidates=buildCandidates();
    var chain=Promise.reject(new Error('start'));
    candidates.slice(0,4).forEach(function(url){
      chain=chain.catch(function(){return tryUrl(url);});
    });
    return chain;
  }).then(function(res){
    APP.online=true;
    APP.useRelative=!!res.relative;
    if(APP.useRelative){
      APP.serverIp='cloud';
    } else {
      APP.serverIp=res.ip||res.base.replace('http://','').replace(':7842','');
      SAVED_IP=APP.serverIp;
      LS.s('serverIp',SAVED_IP);
    }
    updateStatusBar();return true;
  }).catch(function(){APP.online=false;updateStatusBar();return false;});
}

// ── LAN AUTO-DISCOVERY (zero-config pairing) ─────────────────
// Tries to find the desktop server on the same WiFi automatically,
// without the user having to type in an IP address.
function getLocalIP(){
  return new Promise(function(resolve){
    try{
      var RTCPeerConnection=window.RTCPeerConnection||window.mozRTCPeerConnection||window.webkitRTCPeerConnection;
      if(!RTCPeerConnection){resolve(null);return;}
      var pc=new RTCPeerConnection({iceServers:[]});
      var done=false;
      pc.createDataChannel('');
      pc.onicecandidate=function(e){
        if(done||!e.candidate)return;
        var m=/([0-9]{1,3}(?:\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
        if(m&&m[1]!=='0.0.0.0'){done=true;try{pc.close();}catch(e2){}resolve(m[1]);}
      };
      pc.createOffer().then(function(o){return pc.setLocalDescription(o);}).catch(function(){if(!done){done=true;resolve(null);}});
      setTimeout(function(){if(!done){done=true;try{pc.close();}catch(e3){}resolve(null);}},1200);
    }catch(e){resolve(null);}
  });
}
function scanRange(prefix,start,end,port){
  return new Promise(function(resolve){
    var found=false,i=start,batchSize=40;
    function nextBatch(){
      if(found)return;
      if(i>end){if(!found)resolve(null);return;}
      var batch=[];
      for(var k=0;k<batchSize&&i<=end;k++,i++){
        (function(ip){
          batch.push(tryUrl('http://'+prefix+'.'+ip+':'+port).then(function(res){
            if(!found){found=true;resolve(res);}
          }).catch(function(){}));
        })(i);
      }
      Promise.all(batch).then(function(){if(!found)nextBatch();});
    }
    nextBatch();
  });
}
function scanNetwork(showToast){
  if(showToast)toast('🔍 Desktop shodhi rahya chhiye (WiFi scan)...');
  return getLocalIP().then(function(ip){
    var prefixes=[];
    if(ip){var p=ip.split('.');if(p.length===4)prefixes.push(p[0]+'.'+p[1]+'.'+p[2]);}
    ['192.168.1','192.168.0','192.168.29','192.168.225','192.168.43','10.0.0'].forEach(function(pr){
      if(prefixes.indexOf(pr)<0)prefixes.push(pr);
    });
    var chain=Promise.resolve(null);
    prefixes.forEach(function(prefix){
      chain=chain.then(function(res){if(res)return res;return scanRange(prefix,1,254,7842);});
    });
    return chain;
  }).then(function(res){
    if(res&&res.ip){
      APP.online=true;APP.useRelative=false;APP.serverIp=res.ip;SAVED_IP=res.ip;LS.s('serverIp',res.ip);
      updateStatusBar();
      if(showToast)toast('✅ Desktop connected! '+res.ip);
      return true;
    } else {
      if(showToast)toast('Desktop na malyu — IP manually nakho',false);
      return false;
    }
  });
}

// ── CALC ────────────────────────────────────────────────────
function nts(a,b){if(!a||!b)return 0;var d=(new Date(b)-new Date(a))/86400000;return d>0?Math.round(d):0;}
// ── SMART HOTEL DATE SHIFT ──────────────────────────────────
// Read-only helpers used only by the Tour Start Date field (Guest/Confirm tabs)
// to detect how far the date moved and to shift every hotel's Check-in/Check-out
// by that same number of days. Pure date math only — no costing, no calcOpt,
// no pricing logic touched here.
// dayDiff: signed day count from oldIso -> newIso (positive = moved later,
// negative = moved earlier). Uses the same "new Date(iso)" parsing nts() already
// relies on elsewhere, so behavior stays consistent across month-end/year-end/
// leap-year boundaries (native Date/UTC math handles all of those correctly).
function dayDiff(oldIso,newIso){
  if(!oldIso||!newIso)return 0;
  var d=(new Date(newIso)-new Date(oldIso))/86400000;
  return Math.round(d);
}
// shiftIsoDate: returns a new 'YYYY-MM-DD' string moved by offsetDays (+/-).
// Uses setUTCDate (not local setDate) so the shift is correct regardless of the
// browser's local timezone, since 'YYYY-MM-DD' strings are parsed as UTC midnight.
function shiftIsoDate(iso,offsetDays){
  if(!iso||!offsetDays)return iso;
  var d=new Date(iso);
  if(isNaN(d.getTime()))return iso;
  d.setUTCDate(d.getUTCDate()+offsetDays);
  return d.toISOString().slice(0,10);
}
// shiftAllHotelDates: shifts Check-in/Check-out on every hotel row across all
// three options (opt1/opt2/opt3), regardless of which option is currently
// selected/displayed. Only touches h.checkIn/h.checkOut — every other hotel
// field (rates, rooms, meal plan, confirmation no., etc.) is left untouched,
// and fields stay exactly as editable as before since this only rewrites the
// stored value, not the input wiring.
function shiftAllHotelDates(b,offsetDays){
  if(!offsetDays)return;
  ['opt1','opt2','opt3'].forEach(function(k){
    (b[k]||[]).forEach(function(h){
      if(h.checkIn)h.checkIn=shiftIsoDate(h.checkIn,offsetDays);
      if(h.checkOut)h.checkOut=shiftIsoDate(h.checkOut,offsetDays);
    });
  });
}
// wireTourStartShift: attaches the "did Tour Start Date actually change" watcher
// to a Tour Start Date field's wrapper element. Deliberately keyed off 'focusout'
// (fires once when the user leaves the field) rather than the field's own
// live 'input' event — dateInp()'s text side can call its setter more than once
// while a date is still being typed (e.g. a 2-digit-year partial match before the
// 4-digit year is finished), and we only want to prompt once per real edit, with
// the final committed value. This only ever runs for the Tour Start Date field —
// Hotel Check-in/Check-out fields on the Hotels tab are never wired to this, so
// editing hotel dates directly never triggers this dialog.
function wireTourStartShift(wrapEl,b,tab,frag){
  var baseline=b.startDate;
  wrapEl.addEventListener('focusout',function(){
    setTimeout(function(){
      var newV=b.startDate;
      if(baseline&&newV&&baseline!==newV){
        var offset=dayDiff(baseline,newV);
        if(offset!==0){
          confirmDialog(
            'Tour dates have changed. Do you want to automatically update all Hotel Check-in/Check-out dates?',
            function(){
              shiftAllHotelDates(b,offset);
              toast('Hotel Check-in/Check-out dates shifted by '+(offset>0?'+':'')+offset+' day(s)',true);
              // Re-render the current tab only (same self-refresh pattern already
              // used elsewhere in buildTab, e.g. Add/Remove Vehicle) so the Tour
              // dates shown here stay in sync; the Hotels tab picks up the shifted
              // dates live from b.opt1/opt2/opt3 the next time it's opened.
              var tc=frag.parentNode;if(tc){tc.innerHTML='';tc.appendChild(buildTab(tab));}
            },
            'Shift Dates','Cancel'
          );
        }
      }
      baseline=newV;
    },0);
  });
}
// ────────────────────────────────────────────────────────────────────────
// PHASE 1 — Revisions / Unlimited-Options data layer (ADDITIVE, DORMANT).
// Nothing in the app writes b.revisions yet — that starts in Phase 2
// (Hotels tab UI) and Phase 3 (Revision management). Until then, every
// booking that exists has NO b.revisions field, so getOptFields() below
// always takes its "no revisions yet" fallback branch, which reads
// b['opt'+idx]/b['mkPct'+idx]/b['mkFixed'+idx]/b['misc'+idx]/
// b['gstPct'+idx]/b['childVehPct'+idx] — the EXACT SAME fields calcOpt()
// has always read, in the exact same way. Net effect: for every booking
// that exists today, calcOpt()'s output is unchanged by this phase. This
// layer only starts doing anything once a later phase actually gives a
// booking a b.revisions array.
// ────────────────────────────────────────────────────────────────────────

// getActiveRevisionForRead(b): returns the currently-selected revision
// object from b.revisions, or null if this booking has no revisions array
// (true for every booking before Phase 2/3 ship). Read-only — never
// creates or mutates anything, so it's safe to call from calcOpt() on
// every keystroke/re-render.
function getActiveRevisionForRead(b){
  if(!b || !b.revisions || !b.revisions.length) return null;
  var want=b.selectedRevision||1;
  for(var i=0;i<b.revisions.length;i++){ if(b.revisions[i].revNo===want) return b.revisions[i]; }
  return b.revisions[0];
}
// getOptFields(b, idx): the single place calcOpt() now asks "what are this
// option's hotels + markup% + fixed markup + misc + GST% + child-vehicle-%
// settings?" — replacing the five separate b['xxx'+idx] reads that used to
// be scattered through calcOpt(). If a future revision structure exists and
// has an option at this index, that is used; otherwise it falls back to the
// original opt1/opt2/opt3-family fields, completely unchanged.
function getOptFields(b, idx){
  var rev=getActiveRevisionForRead(b);
  if(rev && rev.options && rev.options[idx-1]){
    var o=rev.options[idx-1];
    return{
      hotels:o.hotels||[],
      mkPct:parseFloat(o.mkPct)||0,
      mkFixed:parseFloat(o.mkFixed)||0,
      misc:parseFloat(o.misc)||0,
      gstPct:parseFloat(o.gstPct)||0,
      childVehPct:o.childVehPct!==undefined?(parseFloat(o.childVehPct)||0):0
    };
  }
  // Fallback — the original opt1/opt2/opt3-based storage. This is the path
  // every booking takes today, since no booking has b.revisions yet.
  return{
    hotels:b['opt'+idx]||[],
    mkPct:parseFloat(b['mkPct'+idx])||0,
    mkFixed:parseFloat(b['mkFixed'+idx])||0,
    misc:parseFloat(b['misc'+idx])||0,
    gstPct:parseFloat(b['gstPct'+idx])||0,
    childVehPct:b['childVehPct'+idx]!==undefined?(parseFloat(b['childVehPct'+idx])||0):0
  };
}
// ensureRevisions(b): NOT called anywhere yet in this phase — provided now
// so Phase 2/3 can build on it without calcOpt() needing to change again.
// Derives a b.revisions:[{revNo:1, options:[...]}] structure FROM the
// existing opt1/opt2/opt3 fields, WITHOUT deleting or modifying
// opt1/opt2/opt3 — those are left fully intact so every existing feature
// that still reads them directly (Hotels tab UI, PDF generators, Sticky
// Cost Bar, Option Toolbar — all of it, until their own later phases) keeps
// working exactly as it does today.
function ensureRevisions(b){
  if(!b || (b.revisions && b.revisions.length)) return b;
  var options=[1,2,3].map(function(n){
    return{
      hotels:JSON.parse(JSON.stringify(b['opt'+n]||[])),
      mkPct:b['mkPct'+n]||0,mkFixed:b['mkFixed'+n]||0,misc:b['misc'+n]||0,
      gstPct:b['gstPct'+n]||0,childVehPct:b['childVehPct'+n]||0
    };
  });
  b.revisions=[{revNo:1,status:'draft',options:options}];
  if(!b.selectedRevision) b.selectedRevision=1;
  return b;
}

// PHASE 2 — setOptField(b, idx, field, value): the single place the Hotels
// tab now writes an option-level scalar (mkPct/mkFixed/misc/gstPct/
// childVehPct) — pairs with getOptFields() above (the matching read path).
// Today this always writes b[field+idx], exactly as the Hotels tab did
// directly before — ensureRevisions() is never called yet (see note above),
// so no booking has b.revisions and this is a byte-identical no-op wrapper.
// It also mirrors the same value into an active revision IF one already
// exists (defensive only — harmless today, forward-safe for Phase 3).
function setOptField(b, idx, field, value){
  b[field+idx]=value;
  var rev=getActiveRevisionForRead(b);
  if(rev && rev.options && rev.options[idx-1]) rev.options[idx-1][field]=value;
  return value;
}

function calcOpt(b,idx){
  // PHASE 1: option fields now come through getOptFields() (see data-layer
  // block immediately above) instead of five separate b['xxx'+idx] reads.
  // For every booking that exists today (no b.revisions yet) this resolves
  // to the exact same b['opt'+idx]/b['mkPct'+idx]/etc. fields as before, so
  // calcOpt()'s output is unchanged.
  var optFields=getOptFields(b,idx);
  var opt=optFields.hotels;
  var adults=parseInt(b.adults)||0;
  var chargeableChild=Math.max(0,(parseInt(b.children)||0)-(parseInt(b.compChildren)||0));
  var childNoBedQty=0; // CNB has no Guest-tab equivalent — purely driven by the Hotels tab

  // Hotel cost — adult portion (rooms + extra adults + mattress)
  // Child cost — split into With Bed (CWB) and No Bed (CNB), tracked separately
  // since CNB is normally charged at a lower rate (no extra mattress needed).
  var hotelAdultCost=0;
  var hotelChildCost=0;      // CWB hotel cost
  var hotelChildNoBedCost=0; // CNB hotel cost
  var roomCost=0,extraAdultCost=0,mattressCost=0,childCost=0,childNoBedCost=0;
  var maxExtraAdults=0,maxExtraMattress=0,maxHotelChargeableChild=0,maxHotelChildNoBed=0;
  for(var i=0;i<opt.length;i++){
    var h=opt[i];
    if(!h.hotelName||!h.checkIn||!h.checkOut)continue;
    var n=nts(h.checkIn,h.checkOut);
    var hExtraAdults=parseInt(h.extraAdults)||0;
    var hMattress=parseInt(h.extraMattress)||0;
    var hChild=parseInt(h.chargeableChild)||0;
    var hChildNoBed=parseInt(h.childNoBed)||0;
    // Bug fix (1): Mattress Rate field removed — extra-mattress guests are already
    // charged via the Extra Adult / Chargeable Child rate, so no separate mattress
    // cost is added here (kept at 0 to avoid double-charging). Qty is still tracked
    // for display purposes only.
    roomCost+=n*(parseInt(h.rooms)||1)*(parseFloat(h.ratePerRoom)||0);
    extraAdultCost+=n*hExtraAdults*(parseFloat(h.extraAdultRate)||0);
    // Child cost is SEPARATE — CWB and CNB each at their own rate
    childCost+=n*hChild*(parseFloat(h.childRate)||0);
    childNoBedCost+=n*hChildNoBed*(parseFloat(h.childNoBedRate)||0);
    if(hExtraAdults>maxExtraAdults)maxExtraAdults=hExtraAdults;
    if(hMattress>maxExtraMattress)maxExtraMattress=hMattress;
    if(hChild>maxHotelChargeableChild)maxHotelChargeableChild=hChild;
    if(hChildNoBed>maxHotelChildNoBed)maxHotelChildNoBed=hChildNoBed;
  }
  hotelAdultCost=roomCost+extraAdultCost+mattressCost;
  hotelChildCost=childCost;
  hotelChildNoBedCost=childNoBedCost;
  var hotelCost=hotelAdultCost+hotelChildCost+hotelChildNoBedCost; // total hotel
  // Use the hotel-level chargeable-children qty (per-option, entered on the Hotels tab)
  // when present — falls back to Guest-tab Children minus Comp. 0-5 Yrs otherwise.
  // This is what was causing chargeable-child costing to silently disappear from quotations.
  if(maxHotelChargeableChild>0) chargeableChild=maxHotelChargeableChild;
  if(maxHotelChildNoBed>0) childNoBedQty=maxHotelChildNoBed;

  var vehCost=0;
  (b.vehicles||[]).forEach(function(v){vehCost+=parseFloat(v.cost)||0;});
  // Child Vehicle Share % (per option, default 0 = old behavior unchanged: full
  // vehicle cost stays on Adults). Set to 100 for a full equal per-head split
  // between Adults+Children (industry-standard for a shared group vehicle), or
  // anything in between for a partial "child discount" on the vehicle portion.
  // adultVehShare + total child vehicle share always equals the full vehCost exactly.
  // The total child share is then split between CWB/CNB in proportion to headcount.
  var childVehPct=optFields.childVehPct; // PHASE 1: was b['childVehPct'+idx] — see getOptFields()
  var totalChildHeads=chargeableChild+childNoBedQty;
  var totalHeadsForVeh=adults+totalChildHeads;
  var vehPerHead=totalHeadsForVeh>0?vehCost/totalHeadsForVeh:0;
  var childVehShareTotal=vehPerHead*(childVehPct/100)*totalChildHeads;
  var adultVehShare=vehCost-childVehShareTotal;
  var childVehShare=totalChildHeads>0?childVehShareTotal*(chargeableChild/totalChildHeads):0;
  var childVehShareNoBed=totalChildHeads>0?childVehShareTotal*(childNoBedQty/totalChildHeads):0;

  // PHASE 1: mkPct/mkFixed/misc/gstPct were b['mkPct'+idx] etc. — now read
  // via optFields (see getOptFields() above calcOpt), same fallback values.
  var mkPct=optFields.mkPct;
  var mkFixed=optFields.mkFixed;
  var misc=optFields.misc;
  // GST — selectable per option as 0% / 5% / 18% (some quotations are given without GST)
  var gstPct=optFields.gstPct;

  // Adult base = adult hotel + adult's share of vehicle
  var adultBase=hotelAdultCost+adultVehShare;
  // Child With Bed (CWB) base = CWB hotel + CWB's share of vehicle
  var childBase=hotelChildCost+childVehShare;
  // Child No Bed (CNB) base = CNB hotel + CNB's share of vehicle
  var childNoBedBase=hotelChildNoBedCost+childVehShareNoBed;

  // Bug fix (Fixed Markup — Cost-Weighted Distribution): Fixed Markup is the total
  // profit for the WHOLE package, not an Adult-only charge. Previously it was added
  // 100% into the Adult bucket. Now it is split across Adult / Child-With-Bed /
  // Child-No-Bed in proportion to each bucket's own cost base (Hotel + Vehicle
  // share) — so a bucket that carries more cost also carries more of the fixed
  // profit. Misc/Other Charges is likewise a package-level shared cost (e.g.
  // permits, guide fee) and is distributed the same way for consistency, instead
  // of being loaded entirely onto Adults as before.
  // Percentage Markup logic is untouched — it still applies at mkPct% independently
  // on each bucket's own base, exactly as before.
  // Grand Total is unaffected by this change: it's the same mkFixed/misc total,
  // only its internal split across Adult/CWB/CNB changes, and GST% is identical
  // across all three buckets, so the post-GST sum is identical either way.
  var totalBaseForSplit=adultBase+childBase+childNoBedBase;
  var wAdult=totalBaseForSplit>0?(adultBase/totalBaseForSplit):1;
  var wChild=totalBaseForSplit>0?(childBase/totalBaseForSplit):0;
  var wChildNoBed=totalBaseForSplit>0?(childNoBedBase/totalBaseForSplit):0;
  var mkFixedAdult=mkFixed*wAdult, mkFixedChild=mkFixed*wChild, mkFixedChildNoBed=mkFixed*wChildNoBed;
  var miscAdult=misc*wAdult, miscChild=misc*wChild, miscChildNoBed=misc*wChildNoBed;

  var adultMarkup=adultBase*(mkPct/100)+mkFixedAdult;
  var subTotalAdult=adultBase+adultMarkup+miscAdult;
  var gstAmtAdult=subTotalAdult*(gstPct/100);
  var grandTotalAdult=subTotalAdult+gstAmtAdult;
  // Fix: "Adults" on the Guest tab is already the TOTAL pax count (e.g. 14).
  // "Extra Adults" on the Hotel tab is just a subset of that total used to
  // split the room rate vs extra-adult rate (e.g. 5 rooms x 2 base = 10,
  // remaining 4 of the 14 charged as Extra Adults) — it is NOT additional
  // people on top of Adults. So the per-adult split uses Adults as-is;
  // adding Extra Adults again double-counts them (14+4=18, wrongly
  // inflating the head count and shrinking the per-adult figure).
  var totalAdultHeads=adults;
  var perAdult=totalAdultHeads>0?Math.round(grandTotalAdult/totalAdultHeads):0;

  var childMarkup=childBase*(mkPct/100)+mkFixedChild;
  var subTotalChild=childBase+childMarkup+miscChild;
  var gstAmtChild=subTotalChild*(gstPct/100);
  var grandTotalChild=subTotalChild+gstAmtChild;
  var perChild=chargeableChild>0?Math.round(grandTotalChild/chargeableChild):0;

  // Child No Bed (CNB) — same markup %, but naturally comes out lower per-child
  // since the hotel CNB rate itself is lower.
  var childNoBedMarkup=childNoBedBase*(mkPct/100)+mkFixedChildNoBed;
  var subTotalChildNoBed=childNoBedBase+childNoBedMarkup+miscChildNoBed;
  var gstAmtChildNoBed=subTotalChildNoBed*(gstPct/100);
  var grandTotalChildNoBed=subTotalChildNoBed+gstAmtChildNoBed;
  var perChildNoBed=childNoBedQty>0?Math.round(grandTotalChildNoBed/childNoBedQty):0;

  // Grand total = adult + CWB + CNB totals (GST included)
  var grandTotal=grandTotalAdult+grandTotalChild+grandTotalChildNoBed;
  var base=adultBase; // for display
  var markupAmt=adultMarkup+childMarkup+childNoBedMarkup;
  var gstAmt=gstAmtAdult+gstAmtChild+gstAmtChildNoBed;
  var subTotal=subTotalAdult+subTotalChild+subTotalChildNoBed; // pre-GST total

  return{
    hotelCost:hotelCost,hotelAdultCost:hotelAdultCost,hotelChildCost:hotelChildCost,hotelChildNoBedCost:hotelChildNoBedCost,
    vehCost:vehCost,adultVehShare:adultVehShare,childVehShare:childVehShare,childVehShareNoBed:childVehShareNoBed,childVehPct:childVehPct,
    base:base,markupAmt:markupAmt,misc:misc,
    gstPct:gstPct,gstAmt:gstAmt,subTotal:subTotal,
    grandTotal:grandTotal,grandTotalAdult:grandTotalAdult,grandTotalChild:grandTotalChild,grandTotalChildNoBed:grandTotalChildNoBed,
    perAdult:perAdult,perChild:perChild,perChildNoBed:perChildNoBed,
    chargeableChild:chargeableChild,childNoBedQty:childNoBedQty,adults:totalAdultHeads,baseAdults:adults,
    markupFromPct:adultBase*(mkPct/100),mkFixed:mkFixed,
    roomCost:roomCost,extraAdultCost:extraAdultCost,mattressCost:mattressCost,childCost:childCost,childNoBedCost:childNoBedCost,
    maxExtraAdults:maxExtraAdults,maxExtraMattress:maxExtraMattress
  };
}

// ────────────────────────────────────────────────────────────────────────
// Mobile Sticky Cost Summary — DISPLAY ONLY. Takes an already-computed
// calcOpt() result object (the exact same object refreshSummary() already
// builds on every costing edit) and writes 4 numbers into the sticky bar.
// It does not call calcOpt() itself and does not touch hotelCost, vehCost,
// markupAmt, gstAmt, or grandTotal — those are 100% owned by calcOpt().
// The only arithmetic here is a plain percentage READOUT (markup as a % of
// base cost) purely for display, using the two totals calcOpt() already
// returns — no new rate, cost, or business rule is introduced.
// ────────────────────────────────────────────────────────────────────────
// Smart Colour Coding (mobile-only element — #stickyCostBar is display:none
// on desktop regardless of the .show class, so setting these colors directly
// never touches the desktop UI). Every value below is read straight off the
// calcOpt() result object passed in — nothing here recomputes cost, price,
// profit or margin.
function updateStickyCostBar(c){
  if(!c) return;
  var costEl=document.getElementById('scbCost'),sellEl=document.getElementById('scbSell'),
      profitEl=document.getElementById('scbProfit'),pctEl=document.getElementById('scbProfitPct');
  if(!costEl||!sellEl||!profitEl||!pctEl) return; // sticky bar not in DOM (e.g. desktop-only code path never renders it)
  var totalCost=c.base;          // same figure already shown as "Base Total" in the full Cost Summary
  var sellingPrice=c.grandTotal; // same figure already shown as "GRAND TOTAL" in the full Cost Summary
  var profit=c.markupAmt;        // same figure already shown as "+ Markup / Service" in the full Cost Summary
  var profitPct=totalCost>0?(profit/totalCost*100):0;
  costEl.textContent=fmt(totalCost);
  sellEl.textContent=fmt(sellingPrice);
  profitEl.textContent=fmt(profit);
  pctEl.textContent=profitPct.toFixed(1)+'%';
  // Total Cost → Dark Gray
  costEl.style.color='#8A8B93';
  // Selling Price → Blue
  sellEl.style.color='#3498DB';
  // Profit Amount → Green>0 / Red<0 / Gray=0
  profitEl.style.color = profit>0 ? '#2ECC71' : (profit<0 ? '#E74C3C' : '#8A8B93');
  // Profit % → Green ≥30% / Orange 15–29.99% / Red <15%
  pctEl.style.color = profitPct>=30 ? '#2ECC71' : (profitPct>=15 ? '#E67E22' : '#E74C3C');
}

// ── SMART QUOTATION NUMBERING (MH-<Sequence><YY>) ────────────
// Only the numeric sequence is persisted (LS key 'quotSeq'), never the year —
// so a year rollover needs no migration: YY is always computed fresh at
// generation time from the current date, while the sequence keeps counting
// (…MH-125026 in 2026 -> MH-125127 in 2027, same sequence 1251, new YY).
// Manual edits are handled separately by onManualQuotNoChange (see the
// Quotation No. field in buildTab) so this module never reads the DOM.
function currentYY(){ return String(new Date().getFullYear()%100).padStart(2,'0'); }
function getQuotSeq(){ var s=LS.g('quotSeq'); return (typeof s==='number'&&isFinite(s)&&s>=1000)?s:1000; }
function setQuotSeq(n){ if(typeof n==='number'&&isFinite(n))LS.s('quotSeq',n); }
// Recognizes the smart "MH-<seq><YY>" shape: 'MH-' + at least 6 digits (a
// sequence of >=1001 is 4+ digits, plus exactly 2 digits for YY). The last 2
// digits are always taken as YY and everything before that as the sequence.
// Returns null for anything else (e.g. a custom prefix like "VIP-001"), which
// callers must treat as "leave the auto sequence alone".
function parseSmartQuotNo(v){
  if(!v)return null;
  var m=/^MH-(\d{6,})$/.exec(String(v).trim());
  if(!m)return null;
  var digits=m[1];
  var seq=parseInt(digits.slice(0,-2),10);
  if(isNaN(seq))return null;
  return{seq:seq};
}
// Bug fix: a random quotNo can collide with an existing booking's quotNo. Since saveBooking()
// matches records by quotNo, a collision would silently overwrite a different guest's booking
// instead of creating a new one — which looks like "my save didn't work". Keep generating
// until we get a number not already used by an existing booking (only relevant if a manual
// entry elsewhere ever lands exactly on an upcoming auto number).
function genQuotNo(){
  var existing={};(APP.bookings||[]).forEach(function(b){if(b&&b.quotNo)existing[b.quotNo]=true;});
  var seq=getQuotSeq();
  var qn;
  do{ seq++; qn='MH-'+seq+currentYY(); }while(existing[qn]);
  setQuotSeq(seq);
  return qn;
}
// Called when the user manually edits the Quotation No. field (on blur). If it
// matches the smart MH-<seq><YY> shape, its sequence becomes the new counter
// baseline, so the *next* auto-generated number continues right after it
// (e.g. typing "MH-150026" means the next auto number is "MH-150126"). Any
// other format (custom prefix, free text) is saved as-is elsewhere and must
// NOT reach this far affecting the sequence — callers only invoke this when
// parseSmartQuotNo() already matched.
function onManualQuotNoChange(v){
  var parsed=parseSmartQuotNo(v);
  if(parsed)setQuotSeq(parsed.seq);
}

// "last used" snapshot is captured, which is only on an explicit Save).

}

// ── SERVER BASE URL ──────────────────────────────────────────
function getBase(){
  if(APP.useRelative) return ""; // Netlify (cloud) or desktop serving app on :7842 — same-origin
  if(APP.serverIp) return "http://"+APP.serverIp+":7842"; // LAN desktop server
  return "";
}

// ── AUTHENTICATED API FETCH ───────────────────────────────────
// Adds the login token (cloud mode only) to every API call, and
// forces re-login if the server says the token is invalid/expired.
function apiFetch(path, opts){
  opts=opts||{};
  opts.headers=opts.headers||{};
  if(APP.useRelative && APP.authToken){
    opts.headers['Authorization']='Bearer '+APP.authToken;
  }
  return fetch(getBase()+path, opts).then(function(r){
    if(r.status===401){
      APP.authToken=null;LS.s('authToken',null);
      showLoginScreen();
      throw new Error('unauthorized');
    }
    return r;
  });
}

// Load bookings: server if online, else localStorage
function loadBookings(){
  if(APP.online){
    return apiFetch('/api/bookings').then(function(r){return r.json();})
      .then(function(list){
        APP.bookings=normalizeBookings(list);
        LS.s('bookings',APP.bookings); // mirror to local
        return APP.bookings;
      }).catch(function(){
        APP.bookings=normalizeBookings(LS.g('bookings'));
        return APP.bookings;
      });
  } else {
    APP.bookings=normalizeBookings(LS.g('bookings'));
    return Promise.resolve(APP.bookings);
  }
}

// Save one booking: server + local mirror
function saveBooking(b){
  if(!b.guestName||!b.guestName.trim()){
    toast('⚠ Guest Name is required before saving',false);
    return Promise.reject(new Error('validation: guestName required'));
  }
  normalizeBooking(b);
  b.updatedAt=now();
  // Speed optimization: remember this booking's GST / Markup / Misc values (from
  // Option 1) as the "last used" defaults for the NEXT NEW booking (see newBk()/
  // lastFin()). Only ever read when newBk() runs, so it never touches or
  // overwrites this or any other EXISTING booking's own saved values.
  LS.s('lastFinancials',{mkPct:b.mkPct1||0,mkFixed:b.mkFixed1||0,misc:b.misc1||0,gstPct:b.gstPct1||0});
  // Always save to localStorage immediately
  var local=APP.bookings.slice();
  var idx=-1;
  for(var i=0;i<local.length;i++){if(local[i].quotNo===b.quotNo){idx=i;break;}}
  var copy=JSON.parse(JSON.stringify(b));
  if(idx>=0) local[idx]=copy; else local.unshift(copy);
  APP.bookings=local;
  LS.s('bookings',local);

  if(APP.online){
    return apiFetch('/api/bookings/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(copy)})
      .then(function(r){return r.json();})
      .then(function(){toast('✅ Saved — desktop file updated!');return true;})
      .catch(function(){toast('💾 Saved locally (server unreachable)');APP.pendingSync=true;return false;});
  } else {
    toast('💾 Saved locally — sync when online');
    APP.pendingSync=true;
    return Promise.resolve(false);
  }
}

// ── DELETE TOMBSTONES (offline-safe deletion) ────────────────
// A tombstone {quotNo, deletedAt} is recorded locally whenever a booking is
// deleted, and is sent along on every sync (see doSync) so the deletion is
// guaranteed to reach the server and stay applied — even if the deletion
// happened while offline, or the immediate /bookings/delete call above failed
// silently (as it always has). The server persists these permanently (see
// bookings-sync.js / _shared.js), so a deleted booking can never come back
// just because a sync response replaces APP.bookings. Cleared locally only
// once a sync actually succeeds, since the server has recorded the same
// tombstone by then and no longer needs it resent.
function getTombstones(){ return LS.g('deletedTombstones')||[]; }
function addTombstone(quotNo){
  if(!quotNo)return;
  var list=getTombstones().filter(function(t){return t.quotNo!==quotNo;});
  list.push({quotNo:quotNo,deletedAt:now()});
  LS.s('deletedTombstones',list);
}
function clearTombstones(){ LS.s('deletedTombstones',[]); }

// ── TEMPLATE SYNC TOMBSTONES (Package Master + Itinerary Templates) ─────
// Parallel implementation of the exact same {id/quotNo, deletedAt} tombstone
// pattern used for Bookings just above — kept as its own separate set of
// functions (own LocalStorage keys, keyed by "kind") so the Bookings
// tombstone functions above are never read, modified, or shared by
// reference. kind is 'pkgTemplates' or 'itinTemplates'.
function getTemplateTombstones(kind){ return LS.g(kind+'Tombstones')||[]; }
function addTemplateTombstone(kind,id){
  if(id==null)return;
  var list=getTemplateTombstones(kind).filter(function(t){return t.id!==id;});
  list.push({id:id,deletedAt:now()});
  LS.s(kind+'Tombstones',list);
}
function clearTemplateTombstones(kind){ LS.s(kind+'Tombstones',[]); }
// For each item in the new list: if it's the exact same object reference it
// was in the previous list, its updatedAt is left untouched — every existing
// template add/edit/duplicate/delete call site (Package Master + Itinerary
// Templates screens) already only replaces the item(s) that actually
// changed, via .map()/.concat()/.push()/.filter(), and leaves everything
// else as the same reference, so this requires no change to any of those
// call sites. New/changed items get a fresh updatedAt. Any id present in
// prevList but missing from newList (i.e. deleted) is recorded as a
// tombstone, the same way Bookings deletes already are. Backward
// compatible: a template saved before this feature existed simply has no
// updatedAt yet — the merge on the server treats that as the oldest
// possible value, so it's never mistaken for "newer" but is also never
// dropped (see mergeTemplateList in templates-sync.js).
function stampAndTombstoneTemplates(kind,prevList,newList){
  var prevById={};
  (prevList||[]).forEach(function(p){ if(p&&p.id!=null) prevById[p.id]=p; });
  var seen={};
  var stamped=(newList||[]).map(function(item){
    if(!item) return item;
    seen[item.id]=true;
    if(prevById[item.id]===item) return item; // unchanged reference — leave as-is
    item.updatedAt=now();
    return item;
  });
  Object.keys(prevById).forEach(function(id){
    if(!seen[id]) addTemplateTombstone(kind,prevById[id].id);
  });
  return stamped;
}

// ── HOTEL MASTER SYNC TOMBSTONES (offline-safe Hotel Master sync) ───────
// Parallel implementation of the exact same {id, deletedAt} tombstone
// pattern used for Package/Itinerary Templates and Bookings above — kept as
// its own separate set of functions (own LocalStorage key 'hotelTombstones')
// so none of the Booking or Template tombstone functions above are read,
// modified, or shared by reference. This is what lets a hotel removed while
// offline stay removed everywhere, instead of being resurrected the next
// time some other device (still holding an older copy) syncs.
function getHotelTombstones(){ return LS.g('hotelTombstones')||[]; }
function addHotelTombstone(id){
  if(id==null)return;
  var list=getHotelTombstones().filter(function(t){return t.id!==id;});
  list.push({id:id,deletedAt:now()});
  LS.s('hotelTombstones',list);
}
function clearHotelTombstones(){ LS.s('hotelTombstones',[]); }
// Mirrors stampAndTombstoneTemplates() exactly (same "unchanged reference
// is left alone" check, same "new/changed item gets a fresh updatedAt",
// same "an id present before but missing now becomes a tombstone") but for
// the Hotel Master list. Kept as its own function so
// stampAndTombstoneTemplates / Package Master / Itinerary Templates are
// never touched by this feature. Every existing Hotel Master call site
// (Add / Edit / Remove / Excel-Import in bHotels()) already only replaces
// the item(s) that actually changed and leaves everything else as the same
// object reference, via .concat()/.map()/.filter()/.slice(), so this
// requires no change to any of those call sites — only to saveHotels()
// itself, which now runs every list through this before saving.
// Backward compatible: a hotel saved before this feature existed simply has
// no updatedAt yet — the merge on the server (see mergeHotelList in
// hotels-sync.js) treats that as the oldest possible value, so it's never
// mistaken for "newer" but is also never dropped.
function stampAndTombstoneHotels(prevList,newList){
  var prevById={};
  (prevList||[]).forEach(function(p){ if(p&&p.id!=null) prevById[p.id]=p; });
  var seen={};
  var stamped=(newList||[]).map(function(item){
    if(!item) return item;
    seen[item.id]=true;
    if(prevById[item.id]===item) return item; // unchanged reference — leave as-is
    item.updatedAt=now();
    return item;
  });
  Object.keys(prevById).forEach(function(id){
    if(!seen[id]) addHotelTombstone(prevById[id].id);
  });
  return stamped;
}

// Delete booking
function deleteBooking(qn){
  APP.bookings=APP.bookings.filter(function(b){return b.quotNo!==qn;});
  LS.s('bookings',APP.bookings);
  addTombstone(qn);
  if(APP.online){
    apiFetch('/api/bookings/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({quotNo:qn})}).catch(function(){});
  }
  toast('Deleted');
}

// ── SYNC: send local → server, get merged back ──────────────
function doSync(silent){
  if(!APP.online){if(!silent)toast('Not connected to server',false);return Promise.resolve(false);}
  var local=LS.g('bookings')||[];
  var tombstones=getTombstones();
  if(!silent)toast('Syncing...');
  return apiFetch('/api/bookings/sync',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({bookings:local,tombstones:tombstones})
  }).then(function(r){return r.json();})
  .then(function(res){
    if(res.ok&&res.bookings){
      var changed=JSON.stringify(res.bookings)!==JSON.stringify(APP.bookings);
      APP.bookings=normalizeBookings(res.bookings);
      LS.s('bookings',APP.bookings);
      APP.pendingSync=false;
      // The server has now durably recorded any pending deletions (tombstones)
      // sent above, so they no longer need to be resent on the next sync.
      clearTombstones();
      if(!silent){
        toast('✅ Synced! '+res.bookings.length+' bookings');
        go(APP.page);
      } else if(changed && (APP.page==='list'||APP.page==='dash')){
        // Refresh the currently visible screen quietly if new data arrived from desktop
        go(APP.page);
      }
      return true;
    }
    return false;
  }).catch(function(){if(!silent)toast('Sync failed',false);return false;});
}

// ── SYNC STATUS BADGE (UI ONLY — Package Master / Itinerary Templates) ──
// Purely cosmetic: reflects APP.templatesSyncStatus, never influences sync,
// merge, or tombstone behaviour in any way. Reuses the EXISTING
// templatesPendingSync / doTemplateSync flow as its only source of truth —
// this does not introduce any parallel sync state, just a display layer on
// top of what already exists.
var SYNC_BADGE_SPEC={
  synced:{icon:'☁',label:'Synced',dot:'🟢',bg:'#2ECC7122',fg:'#2ECC71'},
  pending:{icon:'⏳',label:'Pending Sync',dot:'🟡',bg:'#E67E2222',fg:'#E67E22'},
  syncing:{icon:'🔄',label:'Syncing...',dot:'🔵',bg:'#5DADE222',fg:'#5DADE2'},
  failed:{icon:'⚠',label:'Sync Failed',dot:'🔴',bg:'#E74C3C22',fg:'#E74C3C'}
};
function syncBadgeHtml(id){
  var s=SYNC_BADGE_SPEC[APP.templatesSyncStatus]||SYNC_BADGE_SPEC.synced;
  return '<span id="'+id+'" class="sync-badge" style="background:'+s.bg+';color:'+s.fg+'">'+s.dot+' '+s.icon+' '+s.label+'</span>';
}
// Updates any currently-mounted Sync Status badge(s) in place (by element
// id) instead of re-rendering the whole screen — so it never steals focus
// from a field the user is mid-edit on, and needs no manual refresh.
// Silently does nothing if that screen isn't the one currently on-screen
// (element simply absent from the DOM).
function updateSyncStatusBadges(){
  var s=SYNC_BADGE_SPEC[APP.templatesSyncStatus]||SYNC_BADGE_SPEC.synced;
  ['pkgSyncBadge','itinSyncBadge'].forEach(function(id){
    var elm=document.getElementById(id);
    if(!elm)return;
    elm.style.opacity='0';
    setTimeout(function(){
      elm.style.background=s.bg;elm.style.color=s.fg;
      elm.textContent=s.dot+' '+s.icon+' '+s.label;
      elm.style.opacity='1';
    },160);
  });
}
// Single setter — the only place APP.templatesSyncStatus is ever assigned —
// so this UI-only status can never end up tracked in more than one place
// (no duplicated sync-state logic).
function setTemplateSyncStatus(status){
  APP.templatesSyncStatus=status;
  updateSyncStatusBadges();
}

// ── TEMPLATE SYNC: send local Package/Itinerary Templates → server, get
// merged back ── Mirrors doSync() immediately above (same shape: send
// local + tombstones, receive back the merged authoritative list, mirror
// it into LocalStorage, clear tombstones on success) but for Package
// Master + Itinerary Templates via the new /api/templates/sync endpoint.
// doSync() itself is not called or modified by this.
function doTemplateSync(silent){
  if(!APP.online) return Promise.resolve(false);
  // UI-only: remember whether there was actually anything pending BEFORE this
  // sync call, so the badge only animates to "Syncing..." when a real
  // upload is happening — not on every silent background tick that finds
  // nothing to send. This does not change what gets sent, how it's merged,
  // or when doTemplateSync itself runs; it only decides whether to touch
  // the badge.
  var hadPendingChanges=APP.templatesPendingSync;
  if(hadPendingChanges) setTemplateSyncStatus('syncing'); // UI-only — does not affect the request below
  var body={
    pkgTemplates:LS.g('pkgTemplates')||[],
    itinTemplates:LS.g('itinTemplates')||[],
    pkgTombstones:getTemplateTombstones('pkgTemplates'),
    itinTombstones:getTemplateTombstones('itinTemplates')
  };
  return apiFetch('/api/templates/sync',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();})
  .then(function(res){
    if(res&&res.ok){
      if(res.pkgTemplates){APP.pkgTemplates=res.pkgTemplates;LS.s('pkgTemplates',APP.pkgTemplates);}
      if(res.itinTemplates){APP.itinTemplates=res.itinTemplates;LS.s('itinTemplates',APP.itinTemplates);}
      // The server has now durably recorded any pending template deletions
      // (tombstones) sent above, so they no longer need to be resent.
      clearTemplateTombstones('pkgTemplates');
      clearTemplateTombstones('itinTemplates');
      APP.templatesPendingSync=false;
      if(hadPendingChanges) setTemplateSyncStatus('synced'); // UI-only — only animate if we actually had something to sync
      if(!silent) toast('✅ Templates synced!');
      return true;
    }
    if(hadPendingChanges) setTemplateSyncStatus('failed'); // UI-only — server responded but not ok
    return false;
  }).catch(function(){if(hadPendingChanges)setTemplateSyncStatus('failed');if(!silent)toast('Template sync failed',false);return false;});
}

// ── HOTEL MASTER SYNC: send local Hotel Master → server, get merged back ──
// Mirrors doTemplateSync() / doSync() immediately above (same shape: send
// local list + tombstones, receive back the merged authoritative list,
// mirror it into LocalStorage, clear tombstones only once the server has
// durably recorded them) but for the Hotel Master directory, via the new
// /api/hotels/sync endpoint (hotels-sync.js). Does not call, import, or
// modify doSync(), doTemplateSync(), bookings-sync.js, or templates-sync.js
// — kept fully independent so Booking Sync, Booking Logic and Package
// Master are never touched by this feature.
// On failure, hotelsPendingSync stays true and the tombstones are left
// un-cleared, so the very next backgroundSyncTick() (every 20s while the
// app is open) or reconnect resends the exact same pending changes — this
// is the "retry failed uploads" behaviour.
function doHotelSync(silent){
  if(!APP.online) return Promise.resolve(false);
  var body={
    hotels:LS.g('hotels')||APP.hotels||[],
    tombstones:getHotelTombstones()
  };
  return apiFetch('/api/hotels/sync',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();})
  .then(function(res){
    if(res&&res.ok&&res.hotels){
      APP.hotels=res.hotels;
      LS.s('hotels',APP.hotels);
      // The server has now durably recorded any pending hotel deletions
      // (tombstones) sent above, so they no longer need to be resent.
      clearHotelTombstones();
      APP.hotelsPendingSync=false;
      if(!silent) toast('✅ Hotels synced!');
      return true;
    }
    return false;
  }).catch(function(){if(!silent)toast('Hotel sync failed',false);return false;});
}

// ── EXPORT: copy all local data as JSON text ─────────────────
function doExport(){
  var local=LS.g('bookings')||[];
  if(local.length===0){toast('કોઈ data નથી export કરવા માટે',false);return;}
  var json=JSON.stringify({bookings:local,exportedAt:now(),source:'MishriCRM_mobile'});

      toast('✅ '+local.length+' bookings copied! હવે Desktop માં Import કરો');
    }).catch(function(){showExportText(json);});
  } else {
    showExportText(json);
  }
}

// ── CUSTOMER PICKER: reuse an existing customer's details for a repeat
// booking, so the same person doesn't need to be typed in again from
// scratch. Shows every unique guest (by name) found across bookings,
// newest first, with live search. onPick(customer) is called with the
// chosen {guestName, contact, email}; destination is deliberately left
// out since it's different for every trip.
function openCustomerPicker(onPick){
  var old=document.getElementById('custPickModal');
  if(old)old.remove();
  var modal=document.createElement('div');
  modal.id='custPickModal';
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:#0F1117EE;z-index:9999;display:flex;flex-direction:column;padding:16px;gap:10px';

  var title=document.createElement('div');title.style.cssText='color:#D4A843;font-size:16px;font-weight:800;margin-top:40px';title.textContent='👤 Existing Customer પસંદ કરો';
  var hint=document.createElement('div');hint.style.cssText='color:#8A8090;font-size:12px';hint.textContent='Name, Contact, Email auto-fill થશે — Destination ખાલી રહેશે';

  var searchInput=document.createElement('input');
  searchInput.className='inp';searchInput.placeholder='Search name or contact...';
  searchInput.style.cssText='margin-bottom:4px';

  var listWrap=document.createElement('div');listWrap.style.cssText='flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px';

  // Build unique customer list: latest booking per guestName wins (most
  // recent contact/email), sorted by most recently updated first.
  var byName={};
  (APP.bookings||[]).forEach(function(bb){
    if(!bb.guestName)return;
    var key=bb.guestName.trim().toLowerCase();
    if(!key)return;
    var existing=byName[key];
    if(!existing||new Date(bb.updatedAt||bb.createdAt||0)>new Date(existing.updatedAt||existing.createdAt||0)){
      byName[key]=bb;
    }
  });
  var customers=Object.values(byName).sort(function(a,bb){return new Date(bb.updatedAt||bb.createdAt||0)-new Date(a.updatedAt||a.createdAt||0);});

  function render(filterText){
    listWrap.innerHTML='';
    var q=(filterText||'').toLowerCase();
    var filtered=customers.filter(function(c){
      return !q||(c.guestName||'').toLowerCase().indexOf(q)>=0||(c.contact||'').toLowerCase().indexOf(q)>=0;
    });
    if(!filtered.length){
      var empty=document.createElement('div');empty.style.cssText='color:#8A8090;font-size:13px;text-align:center;padding:20px';empty.textContent='કોઈ customer મળ્યો નહીં';
      listWrap.appendChild(empty);return;
    }
    filtered.forEach(function(c){
      var custBookings=(APP.bookings||[]).filter(function(bb){return bb.guestName&&bb.guestName.trim().toLowerCase()===c.guestName.trim().toLowerCase();});
      var card=document.createElement('div');
      card.className='card';
      var row=document.createElement('div');row.style.cssText='display:flex;justify-content:space-between;align-items:center;gap:8px';
      var info=document.createElement('div');info.style.cssText='cursor:pointer;flex:1';
      info.innerHTML='<div style="font-weight:700;font-size:14px">'+c.guestName+'</div>'
        +'<div style="font-size:11px;color:#8A8090;margin-top:3px">'+(c.contact||'—')+(c.email?' &bull; '+c.email:'')+'</div>'
        +'<div style="font-size:11px;color:#D4A843;margin-top:3px">કુલ '+custBookings.length+' booking'+(custBookings.length>1?'s':'')+'</div>';
      info.addEventListener('click',function(){
        onPick({guestName:c.guestName,contact:c.contact,email:c.email});
        modal.remove();
        toast('✅ '+c.guestName+' ની details fill થઈ ગઈ');
      });
      var histBtn=btn('📋 History','btn bm sm',function(){openGuestHistory(c.guestName);});
      histBtn.style.cssText='flex-shrink:0';
      row.appendChild(info);row.appendChild(histBtn);
      card.appendChild(row);
      listWrap.appendChild(card);
    });
  }
  render('');
  searchInput.addEventListener('input',function(){render(searchInput.value);});

  var closeBtn=document.createElement('button');
  closeBtn.className='btn bm';closeBtn.textContent='બંધ કરો';
  closeBtn.addEventListener('click',function(){modal.remove();});

  modal.appendChild(title);modal.appendChild(hint);modal.appendChild(searchInput);modal.appendChild(listWrap);modal.appendChild(closeBtn);
  document.body.appendChild(modal);
  setTimeout(function(){searchInput.focus();},300);
}

    // mid-request).
    doHotelSync(true);

  // init(), backgroundSyncTick() (every 20s) and the on-reconnect network

  // true again, so nothing further needs to happen here for the change to
  // eventually reach the server.

// ── INIT: check server, load data ───────────────────────────
function init(){
  // Step 1: Request persistent storage (prevents browser from clearing data)
  requestPersist();
  // Step 2: Restore from IndexedDB into localStorage if localStorage was cleared
  restoreFromIDB().then(function(){
    // Step 3: Reload hotels from restored storage
    APP.hotels=LS.g('hotels')||DEF_HOTELS;
    // Step 4: Check server & load data
    return checkServer();
  }).then(function(){
    return Promise.all([loadBookings(), loadHotels()]);
  }).then(function(){
    if(APP.online && APP.pendingSync) doSync();
    else go('dash');
    // Pull the latest Package/Itinerary Templates from other devices on
    // startup too — mirrors the Bookings pendingSync check just above,
    // via the new independent template sync path.
    if(APP.online) doTemplateSync(true);
    // Same idea, for the Hotel Master directory — pushes any hotel edits
    // made while this device was offline, and pulls in anything changed on
    // other devices, via the new independent Hotel Master sync path.
    if(APP.online) doHotelSync(true);
    // Show restore notice if we recovered from IDB
    idbGet('bookings').then(function(idbData){
      var lsData=LS.g('bookings')||[];
      if(idbData&&idbData.length>0&&lsData.length===0){
        toast('🔄 Data recovered from backup!');
      }
    });
    // Step 5: If desktop wasn't found via saved IP, try a one-time
    // background network scan for zero-config pairing — doesn't block the UI.
    if(!APP.online){
      scanNetwork(false).then(function(found){
        if(found){ doSync(true); doTemplateSync(true); doHotelSync(true); }
      });
    }
  }).catch(function(){
    // Likely a 401 (expired/invalid token) — apiFetch already triggered
    // the login screen, so there's nothing else to do here.
  });
}

// ── PERIODIC BACKGROUND SYNC (every 20s while app is open AND visible) ───
function backgroundSyncTick(){
  if(document.hidden) return; // skip work while phone is locked / tab backgrounded
  var wasOnline=APP.online;
  checkServer().then(function(isOnline){
    if(isOnline){
      if(!wasOnline)toast('🔗 Connected to desktop!');
      doSync(true); // silent — keeps mobile & desktop continuously in sync
      doTemplateSync(true); // silent — same, for Package/Itinerary Templates
      doHotelSync(true); // silent — same, for the Hotel Master directory (also retries any previously failed upload)
    } else if(!wasOnline){
      // still offline — occasionally retry a full network scan in the background
      scanNetwork(false);
    }
  });
}
setInterval(backgroundSyncTick,20000);
// Catch up immediately when the app regains focus, instead of waiting for the
// next scheduled tick (up to 20s later) — feels instant, no extra polling added.
document.addEventListener('visibilitychange',function(){
  if(!document.hidden) backgroundSyncTick();
});

// ── INSTANT RE-SYNC WHEN APP COMES BACK TO FOREGROUND ────────
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible'){
    checkServer().then(function(isOnline){ if(isOnline) doSync(true); });
  }
});
